name: VTID-01900 News Items Migration

on:
  push:
    branches: [main]
    paths:
      - '.github/workflows/VTID-01900-MIGRATION.yml'
  workflow_dispatch:

jobs:
  migrate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Apply news_items migration
        env:
          SUPABASE_DB_URL: ${{ secrets.SUPABASE_DB_URL }}
        run: |
          sudo apt-get install -y postgresql-client > /dev/null 2>&1
          echo "Applying VTID-01900 migration: news_items table"
          psql "$SUPABASE_DB_URL" -f "supabase/migrations/20260415000000_vtid_01900_longevity_news_feed.sql"
          echo "Migration applied successfully"

      - name: Reload PostgREST schema cache
        env:
          SUPABASE_DB_URL: ${{ secrets.SUPABASE_DB_URL }}
        run: |
          echo "Reloading PostgREST schema cache..."
          psql "$SUPABASE_DB_URL" -c "NOTIFY pgrst, 'reload schema';"
          echo "Schema cache reload signal sent"
