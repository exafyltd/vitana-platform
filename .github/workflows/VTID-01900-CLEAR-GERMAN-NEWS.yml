name: VTID-01900 Clear German News + Refetch

on:
  push:
    branches: [main]
    paths:
      - '.github/workflows/VTID-01900-CLEAR-GERMAN-NEWS.yml'
  workflow_dispatch:

jobs:
  clear-and-refetch:
    runs-on: ubuntu-latest
    steps:
      - name: Delete German trade-press articles
        env:
          SUPABASE_DB_URL: ${{ secrets.SUPABASE_DB_URL }}
        run: |
          sudo apt-get install -y postgresql-client > /dev/null 2>&1
          echo "Removing articles from old German trade-press sources..."
          psql "$SUPABASE_DB_URL" <<'SQL'
          DELETE FROM news_items WHERE source_name IN (
            'Deutsches Ärzteblatt',
            'Ärzte Zeitung',
            'Pharmazeutische Zeitung',
            'NDR Ratgeber Gesundheit',
            'Quarks',
            'Scinexx',
            'Apotheken Umschau',
            'Focus Gesundheit',
            'Apotheke Adhoc'
          );
          SQL
          echo "German trade-press articles cleared. Fetcher will populate with consumer wellness articles on next cycle."
          psql "$SUPABASE_DB_URL" -c "NOTIFY pgrst, 'reload schema';"
