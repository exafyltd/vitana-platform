name: Debug Gateway Logs
on:
  workflow_dispatch:
    inputs:
      filter:
        description: "Log filter (textPayload substring). Empty = no filter (all logs)."
        required: false
        default: "SocialConnect"
      minutes:
        description: "How many minutes back to fetch"
        required: false
        default: "30"
      service:
        description: "Cloud Run service (gateway or gateway-staging)"
        required: false
        default: "gateway"

jobs:
  tail:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    steps:
      - name: Auth to GCP
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WIF_PROVIDER }}
          service_account: ${{ secrets.GCP_WIF_SA_EMAIL }}

      - name: Setup gcloud
        uses: google-github-actions/setup-gcloud@v2

      - name: Read recent gateway logs
        run: |
          SINCE=$(date -u -d "${{ inputs.minutes }} minutes ago" +%Y-%m-%dT%H:%M:%SZ)
          SVC="${{ inputs.service }}"
          FILTER='${{ inputs.filter }}'
          QUERY="resource.type=cloud_run_revision AND resource.labels.service_name=${SVC} AND timestamp>=\"$SINCE\""
          if [ -n "$FILTER" ]; then
            QUERY="$QUERY AND textPayload:\"$FILTER\""
          fi
          echo "Service=$SVC since $SINCE filter=\"$FILTER\""
          gcloud logging read "$QUERY" \
            --project=lovable-vitana-vers1 \
            --limit=300 \
            --order=desc \
            --format='value(timestamp,textPayload)'
