name: Map Cloud Run Domain (one-off helper)

on:
  workflow_dispatch:
    inputs:
      service:
        description: 'Cloud Run service name'
        required: true
      domain:
        description: 'Custom domain to map (e.g. preview.gateway.vitanaland.com)'
        required: true
      region:
        description: 'Cloud Run region'
        required: false
        default: 'us-central1'

permissions:
  contents: read
  id-token: write

jobs:
  map:
    runs-on: ubuntu-latest
    steps:
      - name: Auth to GCP
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WIF_PROVIDER }}
          service_account: ${{ secrets.GCP_WIF_SA_EMAIL }}
      - name: Setup gcloud + beta component
        uses: google-github-actions/setup-gcloud@v2
        with:
          install_components: 'beta'
      - name: Create domain mapping (idempotent)
        run: |
          DOMAIN="${{ github.event.inputs.domain }}"
          SERVICE="${{ github.event.inputs.service }}"
          REGION="${{ github.event.inputs.region }}"
          PROJECT="lovable-vitana-vers1"

          set +e
          EXISTING=$(gcloud --quiet beta run domain-mappings describe "$DOMAIN" \
            --region="$REGION" --project="$PROJECT" \
            --format='value(metadata.name)' 2>/dev/null)
          if [ -n "$EXISTING" ]; then
            echo "Mapping already exists for $DOMAIN — skipping create"
          else
            set -e
            gcloud --quiet beta run domain-mappings create \
              --service="$SERVICE" \
              --domain="$DOMAIN" \
              --region="$REGION" \
              --project="$PROJECT"
          fi
      - name: Show mapping status + required DNS records
        run: |
          gcloud --quiet beta run domain-mappings describe "${{ github.event.inputs.domain }}" \
            --region="${{ github.event.inputs.region }}" --project=lovable-vitana-vers1 \
            --format='yaml(status.resourceRecords,status.conditions,spec.routeName)'
