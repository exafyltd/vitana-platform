name: Apply ORB Latency Phase 1 Policy Retune

# One-shot: applies supabase/migrations/20260612000000_bootstrap_orb_latency_phase1_retune.sql
# (BOOTSTRAP-ORB-LATENCY-PHASE1 / DEV-COMHU-0513, PR #2657).
#
# Inserts version-2 decision_policy rows:
#   voice.post_turn.cooldown_ms   2000 -> 300
#   voice.vad.silence_duration_ms  850 -> 600
#
# The PolicyResolver picks the highest version per key, and DB rows WIN over
# the code fallbacks — so without this apply, the old 2s/850ms seeds keep
# governing voice latency even after the gateway deploy. Runs when this
# workflow itself lands on main, and is safe to re-run (INSERTs are guarded
# by WHERE NOT EXISTS). Rollback = DELETE the version-2 rows.

on:
  push:
    branches: [main]
    paths:
      - '.github/workflows/APPLY-ORB-LATENCY-PHASE1-RETUNE.yml'
  workflow_dispatch:

jobs:
  migrate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Apply latency-retune policy migration
        env:
          SUPABASE_DB_URL: ${{ secrets.SUPABASE_DB_URL }}
        run: |
          sudo apt-get install -y postgresql-client > /dev/null 2>&1
          echo "Applying 20260612000000_bootstrap_orb_latency_phase1_retune.sql"
          psql "$SUPABASE_DB_URL" -f "supabase/migrations/20260612000000_bootstrap_orb_latency_phase1_retune.sql"
          echo "Migration applied"

      - name: Verify effective policy rows
        env:
          SUPABASE_DB_URL: ${{ secrets.SUPABASE_DB_URL }}
        run: |
          # No PostgREST schema reload needed — existing table, new rows only.
          # Print the rows the PolicyResolver will pick (highest version wins;
          # the gateway's 15s resolver cache picks them up without a redeploy).
          psql "$SUPABASE_DB_URL" <<'SQL'
          SELECT policy_key, version, value_json
            FROM decision_policy
           WHERE policy_key IN ('voice.post_turn.cooldown_ms','voice.vad.silence_duration_ms')
           ORDER BY policy_key, version;
          SQL
          echo "Expected: version-2 rows present (300 / 600)"
