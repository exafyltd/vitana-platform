# Phase 0 staging build (handoff brief P0.2 + P0.7):
#
# Deploys gateway-staging on every push to `main` (and on manual dispatch).
# This workflow is INTENTIONALLY SHORT compared to EXEC-DEPLOY.yml — the
# staging stack is exempt from VTID + governance gates so the parent
# session's fine-tuning + brain-unification work can iterate quickly without
# burning ledger entries on disposable commits.
#
# Production deploys remain governed by EXEC-DEPLOY.yml; this workflow does
# NOT change that path.
#
# Three staging-specific secrets must exist in GCP Secret Manager before this
# workflow can succeed (created in P0.1):
#   - STAGING_SUPABASE_URL
#   - STAGING_SUPABASE_SERVICE_ROLE_KEY
#   - STAGING_SUPABASE_ANON_KEY
#
# Required workflow-level secrets (already exist for EXEC-DEPLOY):
#   - GCP_WIF_PROVIDER
#   - GCP_WIF_SA_EMAIL
#   - GOOGLE_GEMINI_API_KEY (gateway needs it for Vertex/Gemini)
#   - SUPABASE_JWT_SECRET (shared with prod — staging JWTs are signed against
#     the same project key; for full isolation, set STAGING_SUPABASE_JWT_SECRET
#     and switch this below.)
#
# Smoke gate at the end refuses to mark the deploy successful if the new
# revision's /api/v1/admin/health doesn't report env=staging — the single
# strongest contract we have that env-aware code (P0.3) is wired correctly.

name: Stage Deploy (gateway-staging)

on:
  push:
    branches: [main]
    paths:
      - 'services/gateway/**'
      - '.github/workflows/STAGE-DEPLOY.yml'
  workflow_dispatch:
    inputs:
      reason:
        description: 'Reason for manual staging redeploy'
        required: false
        default: 'manual smoke'

permissions:
  contents: read
  id-token: write

env:
  GCP_PROJECT: lovable-vitana-vers1
  GCP_REGION: us-central1
  CLOUD_RUN_SERVICE: gateway-staging
  SOURCE_PATH: services/gateway
  ARTIFACT_IMAGE: us-central1-docker.pkg.dev/lovable-vitana-vers1/cloud-run-source-deploy/gateway-staging:latest

jobs:
  stage-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Auth to GCP (Workload Identity Federation)
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WIF_PROVIDER }}
          service_account: ${{ secrets.GCP_WIF_SA_EMAIL }}

      - name: Setup gcloud
        uses: google-github-actions/setup-gcloud@v2

      - name: Resolve commit metadata
        id: commit
        run: |
          SHA="${{ github.sha }}"
          SHORT="$(git rev-parse --short=12 "$SHA")"
          SUBJECT="$(git log -1 --pretty=%s "$SHA" | tr -d '\r')"
          {
            echo "sha=$SHA"
            echo "short=$SHORT"
            echo "subject=$SUBJECT"
          } >> "$GITHUB_OUTPUT"

      - name: Deploy gateway-staging (source build)
        id: deploy
        env:
          GIT_COMMIT_SHA: ${{ steps.commit.outputs.sha }}
        run: |
          set -e
          echo "Deploying ${CLOUD_RUN_SERVICE} from ${SOURCE_PATH} @ ${GIT_COMMIT_SHA:0:12}"

          DEPLOY_ARGS=(
            --source="${SOURCE_PATH}"
            --region="${GCP_REGION}"
            --project="${GCP_PROJECT}"
            --platform=managed
            --allow-unauthenticated
            --memory=1Gi
            --cpu=1
            --timeout=300
            --max-instances=1
            # BOOTSTRAP-ORB-STAGING-WARM: keep one warm instance. With
            # min-instances=0 the gateway cold-starts, and an authenticated
            # ORB /orb/live/session/start takes ~9.4s cold (vs ~4.4s warm) —
            # past the widget's 8s AbortSignal.timeout, so the orb aborts and
            # goes silent on the first open (proven by the e2e harness timing
            # probe). One warm instance keeps session/start well under 8s,
            # matching prod behavior.
            --min-instances=1
          )

          # Env vars: VITANA_ENV is the load-bearing switch (P0.3). Anything else
          # the staging gateway needs MUST be additive — staging code is the same
          # main branch as prod; behavior diverges only by env.
          #
          # VTID-03214 (Phase 1 W3-A): GATEWAY_SERVICE_TOKEN must be in the
          # set-env-vars list. --set-env-vars REPLACES, not merges; any prior
          # --update-env-vars bindings of this key (e.g. via the W2
          # BIND-STAGING-SERVICE-TOKEN.yml one-off) get wiped on every
          # STAGE-DEPLOY run, breaking the admin-staging service-token auth
          # path. Adding it here is the permanent fix.
          ENV_VARS=(
            "VITANA_ENV=staging"
            "ENVIRONMENT=staging"
            "VTID_ALLOCATOR_ENABLED=true"
            "GCP_PROJECT_ID=${GCP_PROJECT}"
            "GIT_COMMIT_SHA=${GIT_COMMIT_SHA}"
            "COMMIT_SHA=${GIT_COMMIT_SHA}"
            "BUILD_INFO_MARKER=${{ steps.commit.outputs.short }}"
            "GATEWAY_SERVICE_TOKEN=${{ secrets.GATEWAY_SERVICE_TOKEN }}"
            # BOOTSTRAP-ORB-LATENCY-PHASE1 (Phase 0): turn on the VTID-03177
            # per-turn voice latency telemetry on staging so the Phase 1-3
            # latency retunes are measurable (voice.latency.measured OASIS
            # events with the per-phase timeline). staging-only — prod stays
            # off until the experiment window graduates it.
            "FEATURE_LATENCY_TELEMETRY_ENV=staging-only"
            # VTID-01973 / VTID-01975 / VTID-01976: enable the Vitana Intent
            # Engine routes (/intents, /intent-matches, /intent-board,
            # /intent-categories, /intent-scan, …). Prod sets this in
            # EXEC-DEPLOY.yml; staging omitted it, and because --set-env-vars
            # REPLACES (not merges) the env, the routes never mounted on
            # gateway-staging — every intents/board call 404'd, so Find a
            # Partner / matches could not load on preview.vitanaland.com.
            "FEATURE_INTENT_ENGINE_A=true"
            # DEV-COMHU-0513 (ORB first-greeting latency): bake the fast-greeting
            # stack into the staging env so it PERSISTS across every STAGE-DEPLOY
            # (--set-env-vars REPLACES, so hand-set gcloud flags were wiped on the
            # next deploy — the cause of "fast-start keeps reverting to off").
            #   FAST_START      → defer wake-brief/journey off session/start
            #   SAFE_FAST_GREETING → short audio-safe opener when context is still
            #                        pending (else the long intro makes Gemini go
            #                        text-only → no audio greeting)
            #   GATE cap 300ms  → greeting fires ~immediately after session-ready,
            #                     targeting a ~3s spoken greeting (vs ~7s legacy)
            # staging-only; prod stays on the legacy path until this graduates.
            "FEATURE_ORB_FAST_START_ENV=staging-only"
            "FEATURE_ORB_SAFE_FAST_GREETING_ENV=staging-only"
            "ORB_CONTEXT_READY_GATE_TIMEOUT_MS=300"
            # NAV continuation / journey-mode experiments — bake into the staging
            # env so they PERSIST across every STAGE-DEPLOY (--set-env-vars
            # REPLACES, so a hand-set gcloud flag is wiped on the next push — the
            # same trap that bit fast-start above). staging-only; prod stays off
            # until these graduate via the PUBLISH path.
            #   NAV_GUIDED_JOURNEY    → "guided" vs "full app" durable-mode switch
            #                           on My Journey (incl. widened phrasing)
            #   NAV_CONTINUATION_BIND → bind "Ja"/"yes" to a pending nav offer
            #                           (offer_action + auto-capture + turn_complete)
            "NAV_GUIDED_JOURNEY=true"
            "NAV_CONTINUATION_BIND=true"
            # BOOTSTRAP-MEMORY-DAILY-LEARNING: OpenAI (fact-embedding backfill,
            # AP-0910) and DeepSeek (primary provider for inline fact
            # extraction + AP-0911 user-model synthesis — Vertex was failing
            # at runtime on gateway-staging) keys. Bound as plain GitHub
            # Actions secrets, same pattern EXEC-DEPLOY.yml already uses for
            # prod (no GCP Secret Manager entry needed) — added here because
            # staging previously bound neither, so both features silently
            # no-op'd on preview-gateway.vitanaland.com.
            "OPENAI_API_KEY=${{ secrets.OPENAI_API_KEY }}"
            "DEEPSEEK_API_KEY=${{ secrets.DEEPSEEK_API_KEY }}"
            # VTID-03403: Bedrock activation gate + region. Not a secret — the
            # SDK auth comes from AWS_ACCESS_KEY_ID/AWS_SECRET_ACCESS_KEY below,
            # this is just the presence flag invokeBedrock() checks. Bake into
            # this workflow (not a one-off gcloud call) for the same reason as
            # every other entry above: --set-env-vars REPLACES the whole env on
            # every STAGE-DEPLOY run, so anything set out-of-band gets wiped on
            # the next push (confirmed live: it wiped a manual binding of this
            # exact var).
            "AWS_BEDROCK_REGION=eu-central-1"
            "BEDROCK_ROLE_ARN=gateway-staging-static-iam-user"
          )

          # Comma-joined for --set-env-vars (replaces, not merges — we want the
          # staging env vars to be authoritative on this service).
          ENV_VARS_JOINED=$(IFS=, ; echo "${ENV_VARS[*]}")

          # Secrets: Supabase.
          # BOOTSTRAP-ORB-STAGING-SUPABASE-ALIGN: the staging FRONTEND
          # (community-app-staging) authenticates users against the PROD Supabase
          # project (inmkhvwdcuyhnxkgfvsb). Previously the gateway pointed at a
          # SEPARATE staging Supabase (STAGING_SUPABASE_* → rsdakjqpvcpgomltdmxu),
          # so logged-in users existed in the frontend's DB but NOT in the
          # gateway's DB → identity/context resolution failed (journey/state 500,
          # permitted_roles 404) and authenticated ORB voice hung on "connecting".
          # Align the gateway to the SAME project the frontend uses by binding the
          # prod SUPABASE_* secrets. (JWT secret was already shared.)
          SECRETS=(
            "SUPABASE_URL=SUPABASE_URL:latest"
            "SUPABASE_SERVICE_ROLE=SUPABASE_SERVICE_ROLE:latest"
            "SUPABASE_ANON_KEY=SUPABASE_ANON_KEY:latest"
            "SUPABASE_JWT_SECRET=SUPABASE_JWT_SECRET:latest"
            "GOOGLE_GEMINI_API_KEY=GOOGLE_GEMINI_API_KEY:latest"
            # VTID-03403: static IAM user credentials for the Bedrock adapter.
            # --set-secrets REPLACES too — same trap as ENV_VARS above, this is
            # the durable fix (was previously bound via a one-off
            # gcloud run services update that this workflow wiped on redeploy).
            "AWS_ACCESS_KEY_ID=gateway-aws-access-key-id:latest"
            "AWS_SECRET_ACCESS_KEY=gateway-aws-secret-access-key:latest"
          )
          SECRETS_JOINED=$(IFS=, ; echo "${SECRETS[*]}")

          gcloud run deploy "${CLOUD_RUN_SERVICE}" \
            "${DEPLOY_ARGS[@]}" \
            --set-env-vars="${ENV_VARS_JOINED}" \
            --set-secrets="${SECRETS_JOINED}" \
            --quiet

          URL=$(gcloud run services describe "${CLOUD_RUN_SERVICE}" \
            --region="${GCP_REGION}" --project="${GCP_PROJECT}" \
            --format='value(status.url)')
          REV=$(gcloud run services describe "${CLOUD_RUN_SERVICE}" \
            --region="${GCP_REGION}" --project="${GCP_PROJECT}" \
            --format='value(status.latestReadyRevisionName)')

          echo "service_url=$URL" >> "$GITHUB_OUTPUT"
          echo "revision=$REV" >> "$GITHUB_OUTPUT"
          echo "Deployed: ${CLOUD_RUN_SERVICE}@${REV} → $URL"

      - name: Smoke /api/v1/admin/health (env=staging required)
        id: smoke
        env:
          URL: ${{ steps.deploy.outputs.service_url }}
        run: |
          set -e
          echo "Smoke: $URL/api/v1/admin/health"
          # Retry up to 6 times — staging cold-starts can take a beat.
          for i in 1 2 3 4 5 6; do
            BODY=$(curl -fsS "$URL/api/v1/admin/health" 2>/dev/null || echo '')
            if [ -n "$BODY" ]; then
              ENV=$(echo "$BODY" | jq -r '.env // empty')
              if [ "$ENV" = "staging" ]; then
                echo "✓ env=staging, supabase_host=$(echo "$BODY" | jq -r '.supabase_host')"
                exit 0
              fi
              echo "Smoke attempt $i: env=$ENV (expected staging). Body: $BODY"
            else
              echo "Smoke attempt $i: empty response"
            fi
            sleep 10
          done
          echo "::error::Staging smoke failed — /api/v1/admin/health did not return env=staging after 6 attempts"
          exit 1

      - name: Backfill software_versions + emit OASIS event (best-effort)
        env:
          SHA: ${{ steps.commit.outputs.sha }}
          SHORT: ${{ steps.commit.outputs.short }}
          SUBJECT: ${{ steps.commit.outputs.subject }}
          REVISION: ${{ steps.deploy.outputs.revision }}
        run: |
          # Best-effort post-deploy tracking. The actual deploy + smoke already
          # passed before this step; missing IAM here must NOT fail the workflow.
          # The WIF service account may not have roles/secretmanager.secretAccessor
          # on the SUPABASE_* secrets; in that case we skip the write and rely on
          # /api/v1/admin/health serving as the source of truth for the new revision.
          # Also: the `cloud_run_revision` column on prod's software_versions is
          # only present once the supabase staging branch is merged to main (the
          # P0.4 migration is staging-only until that merge). We omit the column
          # from the INSERT for now and put the revision name in oasis_events.metadata.
          set +e
          SUPABASE_URL=$(gcloud secrets versions access latest --secret=SUPABASE_URL --project="${GCP_PROJECT}" 2>/dev/null)
          SUPABASE_SVC=$(gcloud secrets versions access latest --secret=SUPABASE_SERVICE_ROLE --project="${GCP_PROJECT}" 2>/dev/null)
          if [ -z "$SUPABASE_URL" ] || [ -z "$SUPABASE_SVC" ]; then
            echo "::warning::WIF SA lacks secretmanager.versions.access for SUPABASE_URL/SUPABASE_SERVICE_ROLE — skipping post-deploy backfill. Deploy itself succeeded; see Cloud Run for the live revision."
            exit 0
          fi

          NEXT_SWV=$(curl -fsS \
            "$SUPABASE_URL/rest/v1/software_versions?select=swv_id&order=created_at.desc&limit=1" \
            -H "apikey: $SUPABASE_SVC" \
            -H "Authorization: Bearer $SUPABASE_SVC" | jq -r '.[0].swv_id // "SWV-0000"')
          NEXT_NUM=$(( ${NEXT_SWV##SWV-} + 1 ))
          NEXT_SWV_ID=$(printf "SWV-%04d" "$NEXT_NUM")

          echo "Recording $NEXT_SWV_ID for gateway-staging@${REVISION}"

          # VTID-03177 (PROFILE): upsert on swv_id so two concurrent STAGE-DEPLOY
          # runs that race to claim the same NEXT_SWV_ID don't 409. The "max+1"
          # increment is inherently racy; merge-duplicates makes the second
          # writer idempotent rather than failing. Body is identical on collision
          # so the merge is a no-op in practice.
          curl -fsS -X POST "$SUPABASE_URL/rest/v1/software_versions?on_conflict=swv_id" \
            -H "Content-Type: application/json" \
            -H "apikey: $SUPABASE_SVC" \
            -H "Authorization: Bearer $SUPABASE_SVC" \
            -H "Prefer: resolution=merge-duplicates,return=minimal" \
            -d "$(jq -nc \
              --arg swv "$NEXT_SWV_ID" \
              --arg sha "$SHA" \
              '{swv_id:$swv, service:"gateway-staging", git_commit:$sha, deploy_type:"normal", initiator:"agent", status:"success", environment:"staging"}')" || \
            echo "::warning::software_versions UPSERT failed (likely IAM or schema); continuing."

          EVENT_BODY=$(jq -nc \
            --arg sha "$SHA" \
            --arg short "$SHORT" \
            --arg subj "$SUBJECT" \
            --arg rev "$REVISION" \
            --arg swv "$NEXT_SWV_ID" \
            '{
              id: "00000000-0000-0000-0000-000000000000",
              vtid: "BOOTSTRAP-STAGE-DEPLOY",
              topic: "staging.deploy.completed",
              service: "gateway-staging",
              role: "CICD",
              model: "stage-deploy",
              status: "success",
              message: ("STAGE-DEPLOY: " + $short + " — " + $subj),
              metadata: {
                env: "staging",
                git_commit: $sha,
                cloud_run_revision: $rev,
                swv_id: $swv,
                workflow: "STAGE-DEPLOY.yml"
              }
            }' | jq 'del(.id)')

          curl -fsS -X POST "$SUPABASE_URL/rest/v1/oasis_events" \
            -H "Content-Type: application/json" \
            -H "apikey: $SUPABASE_SVC" \
            -H "Authorization: Bearer $SUPABASE_SVC" \
            -H "Prefer: return=minimal" \
            -d "$EVENT_BODY"

          echo "✓ software_versions row + staging.deploy.completed event emitted"

      - name: Emit failure event (only on workflow failure)
        if: failure()
        env:
          SHA: ${{ github.sha }}
          REVISION: ${{ steps.deploy.outputs.revision }}
        run: |
          set +e
          SUPABASE_URL=$(gcloud secrets versions access latest --secret=SUPABASE_URL --project="${GCP_PROJECT}" 2>/dev/null) || exit 0
          SUPABASE_SVC=$(gcloud secrets versions access latest --secret=SUPABASE_SERVICE_ROLE --project="${GCP_PROJECT}" 2>/dev/null) || exit 0
          curl -fsS -X POST "$SUPABASE_URL/rest/v1/oasis_events" \
            -H "Content-Type: application/json" \
            -H "apikey: $SUPABASE_SVC" \
            -H "Authorization: Bearer $SUPABASE_SVC" \
            -H "Prefer: return=minimal" \
            -d "$(jq -nc --arg sha "$SHA" --arg rev "$REVISION" '{
              vtid:"BOOTSTRAP-STAGE-DEPLOY",
              topic:"staging.deploy.failed",
              service:"gateway-staging",
              role:"CICD",
              model:"stage-deploy",
              status:"error",
              message:("STAGE-DEPLOY failed @ " + ($sha[:7])),
              metadata: { env:"staging", git_commit:$sha, cloud_run_revision:$rev, workflow:"STAGE-DEPLOY.yml" }
            }')" || true
