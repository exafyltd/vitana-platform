# VTID-02703: Build + deploy the autopilot executor as a Cloud Run JOB.
#
# Why a Job (not a service):
#   The gateway service runs the executor's LLM call as a fire-and-forget
#   background Promise. Cloud Run recycles service containers, killing
#   in-flight Promises. Long calls (orb-live.ts ~80k input + 50k output
#   tokens, ~3-5 min) statistically hit a recycle and silently die.
#
#   Cloud Run JOBS run a single task to completion with a configurable
#   timeout (up to 24h). They don't get scaled or recycled mid-run.
#
# Trigger:
#   - Manual via workflow_dispatch (operator-initiated rebuild)
#   - From the gateway via Cloud Run Admin API (per-execution dispatch)
#
# This workflow only handles BUILD + DEPLOY (the Job container itself).
# Per-execution dispatch is in the gateway's runExecutionSession path.

name: Deploy Autopilot Job (VTID-02703)

# Triggers:
#   1. Manual: workflow_dispatch with overridable knobs (memory/cpu/timeout).
#   2. Auto: every push to main that touches services/gateway/** or this
#      workflow file. Without auto-trigger, the Job image silently drifts —
#      we shipped 12 days of gateway changes (2026-05-05 → 2026-05-17) while
#      the Job ran stale code and every dispatched execution hung.
on:
  push:
    branches: [main]
    paths:
      - 'services/gateway/**'
      - '.github/workflows/DEPLOY-AUTOPILOT-JOB.yml'
  workflow_dispatch:
    inputs:
      vtid:
        description: 'VTID for this deploy'
        required: true
        default: 'VTID-02703'
      timeout_seconds:
        description: 'Max task duration (Cloud Run Jobs: up to 86400 = 24h)'
        required: false
        default: '3600'
      memory:
        description: 'Memory per task (e.g. 1Gi, 2Gi)'
        required: false
        default: '2Gi'
      cpu:
        description: 'CPU per task (1, 2, 4, 8)'
        required: false
        default: '2'

jobs:
  # Staging-first cutover gate. Freezes the AUTOMATIC (push) build+deploy of the
  # live autopilot Cloud Run Job at/after Mon 8 Jun 2026, 10:00 Europe/Berlin.
  # No staging twin for the job, so the push path is freeze-only post-cutover;
  # deploy via manual workflow_dispatch (the documented exception). Manual
  # dispatch is never frozen.
  cutover_gate:
    runs-on: ubuntu-latest
    outputs:
      frozen: ${{ steps.gate.outputs.frozen }}
    steps:
      - name: Evaluate staging-first cutover
        id: gate
        shell: bash
        run: |
          CUTOVER_EPOCH="$(date -d 'TZ="Europe/Berlin" 2026-06-08 10:00:00' +%s)"
          NOW_EPOCH="$(date -u +%s)"
          if [ "${GITHUB_EVENT_NAME}" = "workflow_dispatch" ]; then
            echo "Manual dispatch → not frozen (deliberate prod exception)."
            echo "frozen=false" >> "$GITHUB_OUTPUT"
          elif [ "$NOW_EPOCH" -ge "$CUTOVER_EPOCH" ]; then
            echo "::warning::Staging-first cutover ACTIVE — auto deploy of the autopilot job to LIVE is frozen. Use a manual workflow_dispatch to ship."
            echo "frozen=true" >> "$GITHUB_OUTPUT"
          else
            echo "Pre-cutover — auto deploy proceeds (cutover at $(date -u -d @${CUTOVER_EPOCH}) UTC)."
            echo "frozen=false" >> "$GITHUB_OUTPUT"
          fi

  deploy:
    needs: cutover_gate
    if: needs.cutover_gate.outputs.frozen != 'true'
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WIF_PROVIDER }}
          service_account: ${{ secrets.GCP_WIF_SA_EMAIL }}
          project_id: lovable-vitana-vers1

      - uses: google-github-actions/setup-gcloud@v2

      - name: Login to Artifact Registry (oauth2accesstoken)
        # WIF gives us a short-lived OAuth token; gcloud configure-docker
        # only sets a credential helper that isn't honored here. Explicit
        # docker login with the access token works.
        #
        # Retry: 2026-05-17 saw a real-deal transient "context deadline
        # exceeded" against pkg.dev's token endpoint that failed the whole
        # workflow. Three attempts with a 10s pause cleanly absorbs that.
        run: |
          for attempt in 1 2 3; do
            if gcloud auth print-access-token | docker login -u oauth2accesstoken --password-stdin us-central1-docker.pkg.dev; then
              echo "docker login ok on attempt $attempt"
              exit 0
            fi
            echo "docker login attempt $attempt failed — sleeping 10s"
            sleep 10
          done
          echo "docker login failed after 3 attempts" >&2
          exit 1

      - name: Build container with Dockerfile.job (local docker)
        env:
          PROJECT: lovable-vitana-vers1
          REGION: us-central1
          IMAGE_NAME: autopilot-executor
        run: |
          set -e
          IMAGE_URI="$REGION-docker.pkg.dev/$PROJECT/cloud-run-source-deploy/$IMAGE_NAME:${{ github.sha }}"
          echo "Building $IMAGE_URI"

          cd services/gateway
          # BUILD_INFO is read at runtime; capture deploy SHA + time.
          echo "{\"sha\":\"${{ github.sha }}\",\"deployed_at\":\"$(date -u +%Y-%m-%dT%H:%M:%SZ)\",\"role\":\"autopilot-executor\"}" > BUILD_INFO

          # Direct docker build + push. Simpler than gcloud builds submit
          # (no remote build, no inline cloudbuild.yaml, no --tag/--config
          # mutex problems). The runner already has docker available.
          docker build -f Dockerfile.job -t "$IMAGE_URI" .
          docker push "$IMAGE_URI"

          echo "image_uri=$IMAGE_URI" >> $GITHUB_OUTPUT
        id: build

      - name: Deploy as Cloud Run Job
        env:
          PROJECT: lovable-vitana-vers1
          REGION: us-central1
          JOB_NAME: autopilot-executor
          # On push triggers `inputs.*` is empty; fall back to the same
          # defaults the workflow_dispatch form declares so the gcloud
          # flags stay valid either way.
          TIMEOUT_SECONDS: ${{ github.event.inputs.timeout_seconds || '3600' }}
          MEMORY: ${{ github.event.inputs.memory || '2Gi' }}
          CPU: ${{ github.event.inputs.cpu || '2' }}
        run: |
          set -e
          IMAGE_URI="$REGION-docker.pkg.dev/$PROJECT/cloud-run-source-deploy/autopilot-executor:${{ github.sha }}"

          gcloud run jobs deploy "$JOB_NAME" \
            --image="$IMAGE_URI" \
            --region="$REGION" \
            --project="$PROJECT" \
            --task-timeout="${TIMEOUT_SECONDS}s" \
            --memory="$MEMORY" \
            --cpu="$CPU" \
            --max-retries=0 \
            --parallelism=1 \
            --tasks=1 \
            --update-env-vars="ENVIRONMENT=dev-sandbox" \
            --update-env-vars="GCP_PROJECT_ID=$PROJECT" \
            --update-env-vars="GOOGLE_CLOUD_PROJECT=$PROJECT" \
            --update-env-vars="DEV_AUTOPILOT_GITHUB_REPO=exafyltd/vitana-platform" \
            --update-env-vars="GITHUB_SAFE_MERGE_TOKEN=${{ secrets.SAFE_MERGE_TOKEN }}" \
            --update-env-vars="OPENAI_API_KEY=${{ secrets.OPENAI_API_KEY }}" \
            --update-env-vars="ANTHROPIC_API_KEY=${{ secrets.ANTHROPIC_API_KEY }}" \
            --update-secrets="SUPABASE_URL=SUPABASE_URL:latest" \
            --update-secrets="SUPABASE_SERVICE_ROLE=SUPABASE_SERVICE_ROLE:latest" \
            --update-secrets="GOOGLE_GEMINI_API_KEY=GOOGLE_GEMINI_API_KEY:latest" \
            --quiet

          echo "Job $JOB_NAME deployed."
          gcloud run jobs describe "$JOB_NAME" --region="$REGION" --project="$PROJECT" \
            --format='value(latestCreatedExecution.name,latestSucceededExecution.name)' || true
