name: Voice Pipeline Parity Scanner

# Reports drift between voice-pipeline-spec/spec.json and the actual
# implementations in services/gateway/src/routes/orb-live.ts (Vertex)
# and services/agents/orb-agent/ (LiveKit, when it ships).
#
# Today: REPORT-ONLY. Posts a comment on the PR. Does not block merges.
# After 30 days of green runs, promotion plan is in voice-pipeline-spec/README.md.

on:
  pull_request:
    paths:
      - 'voice-pipeline-spec/**'
      - 'services/gateway/src/routes/orb-live.ts'
      - 'services/agents/orb-agent/**'
      - '.github/workflows/voice-pipeline-parity-scanner.yml'
  push:
    branches:
      - main
    paths:
      - 'voice-pipeline-spec/**'
      - 'services/gateway/src/routes/orb-live.ts'
      - 'services/agents/orb-agent/**'
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: write

jobs:
  scan:
    runs-on: ubuntu-latest
    timeout-minutes: 8

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: voice-pipeline-spec/package-lock.json

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install scanner deps
        working-directory: voice-pipeline-spec
        run: npm ci --no-audit --no-fund

      - name: Install libcst (for Python extractor)
        run: pip install --quiet libcst

      - name: Validate spec.json
        working-directory: voice-pipeline-spec
        run: npm run validate-spec

      - name: Extract Vertex surface (TypeScript)
        working-directory: voice-pipeline-spec
        run: npm run extract:ts

      - name: Extract LiveKit surface (Python)
        working-directory: voice-pipeline-spec
        run: npm run extract:py

      - name: Three-way diff
        id: diff
        working-directory: voice-pipeline-spec
        run: |
          set -o pipefail
          npm run diff 2>&1 | tee /tmp/parity-report.md
          # Strip the npm prefix lines so the PR comment is clean.
          sed -i '/^> /d; /^$/N;/^\n$/D' /tmp/parity-report.md || true
          {
            echo 'report<<__EOM__'
            cat /tmp/parity-report.md
            echo '__EOM__'
          } >> "$GITHUB_OUTPUT"

      - name: Upload diff artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: voice-pipeline-parity-diff
          path: |
            voice-pipeline-spec/extracted/vertex.json
            voice-pipeline-spec/extracted/livekit.json
            voice-pipeline-spec/extracted/diff.json
          retention-days: 30

      - name: Comment on PR
        if: github.event_name == 'pull_request'
        uses: marocchino/sticky-pull-request-comment@v2
        with:
          header: voice-pipeline-parity-scanner
          message: ${{ steps.diff.outputs.report }}

  # Phase-1 gate (disabled today): when the scanner has 30 days of green runs,
  # uncomment this job to fail PRs that introduce safety_critical drift.
