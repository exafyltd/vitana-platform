name: Cron Autopilot Backlog Drain Plan

# VTID-03224 — Phase 1 W3-C0 PR 1.
#
# Reads pending dev-autopilot rows from prod vtid_ledger and produces a
# ranked drain plan. DOES NOT execute, approve, reject, or snooze
# anything. Evidence + recommendation only.
#
# Daily 09:00 UTC — 15 min after CANARY-READINESS-REPORT so the operator
# sees the canary verdict + backlog plan together every morning.

on:
  schedule:
    - cron: '0 9 * * *'
  workflow_dispatch: {}

permissions:
  contents: read
  id-token: write

concurrency:
  group: cron-autopilot-backlog-drain-plan
  cancel-in-progress: false

env:
  GCP_PROJECT: lovable-vitana-vers1

jobs:
  plan:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: services/gateway/package-lock.json

      - name: Install gateway deps
        working-directory: services/gateway
        run: npm ci --no-audit --no-fund

      - uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WIF_PROVIDER }}
          service_account: ${{ secrets.GCP_WIF_SA_EMAIL }}

      - uses: google-github-actions/setup-gcloud@v2

      - name: Resolve prod Supabase creds
        run: |
          set -euo pipefail
          PROD_URL=$(gcloud secrets versions access latest --secret=SUPABASE_URL --project="${GCP_PROJECT}" 2>/dev/null || echo '')
          PROD_KEY=$(gcloud secrets versions access latest --secret=SUPABASE_SERVICE_ROLE --project="${GCP_PROJECT}" 2>/dev/null || echo '')
          if [ -z "$PROD_URL" ] || [ -z "$PROD_KEY" ]; then
            echo "::error::Could not resolve prod Supabase creds. Backlog drain plan cannot run without them."
            exit 1
          fi
          echo "::add-mask::$PROD_URL"
          echo "::add-mask::$PROD_KEY"
          {
            echo "PROD_SUPABASE_URL=$PROD_URL"
            echo "PROD_SUPABASE_SERVICE_ROLE=$PROD_KEY"
          } >> "$GITHUB_ENV"

      - name: Generate backlog drain plan
        working-directory: services/gateway
        env:
          REPORT_MARKDOWN_PATH: /tmp/autopilot-backlog-drain-plan.md
        run: |
          set -euo pipefail
          npx tsx scripts/autopilot/backlog-drain-plan.ts > /tmp/autopilot-backlog-drain-plan.json
          echo "JSON written: $(wc -c < /tmp/autopilot-backlog-drain-plan.json) bytes"
          echo "Markdown written: $(wc -c < /tmp/autopilot-backlog-drain-plan.md 2>/dev/null || echo 0) bytes"

      - name: Append summary
        if: always()
        run: |
          if [ -f /tmp/autopilot-backlog-drain-plan.md ]; then
            cat /tmp/autopilot-backlog-drain-plan.md >> "$GITHUB_STEP_SUMMARY"
          else
            echo '## Autopilot backlog drain plan'                      >> "$GITHUB_STEP_SUMMARY"
            echo ''                                                      >> "$GITHUB_STEP_SUMMARY"
            echo 'Planner did not produce Markdown — see logs.'         >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: autopilot-backlog-drain-plan-${{ github.run_id }}
          path: |
            /tmp/autopilot-backlog-drain-plan.json
            /tmp/autopilot-backlog-drain-plan.md
          if-no-files-found: warn
          retention-days: 90
