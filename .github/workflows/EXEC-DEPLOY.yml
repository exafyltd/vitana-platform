name: Exec Deploy (VTID Bridge)
# VTID-0416: Gateway Deploy Governance Lockdown
# VTID-01032: Extended for multi-service autonomous merge→deploy
#
# This is the CANONICAL deployment workflow for gateway and other services.
# All deploys must go through this governed, validated CI pipeline.
#
# Multi-service support (VTID-01032):
# - Gateway triggers this workflow once per service when autonomous-pr-merge detects multiple services
# - Each invocation deploys a single service using the 'service' input
# - Services are deployed in the order they are triggered (parallel execution possible)
# - OASIS events track each service deployment separately: deploy.<service>.success/failed
#
# Supported services (from config/service-path-map.json):
# - gateway: services/gateway/ -> Cloud Run 'gateway'
# - oasis-operator: services/oasis-operator/ -> Cloud Run 'oasis-operator'
# - oasis-projector: services/oasis-projector/ -> Cloud Run 'oasis-projector'
# - vitana-verification-engine: services/agents/vitana-orchestrator/ -> Cloud Run 'vitana-verification-engine'
#
on:
  workflow_dispatch:
    inputs:
      vtid:
        description: 'VTID'
        required: true
      service:
        description: 'Service name (e.g., gateway, oasis-operator)'
        required: true
        default: 'gateway'
      source_path:
        description: 'Source path (e.g., services/gateway)'
        required: false
        default: ''
      health_path:
        description: 'Health path'
        required: true
        default: '/alive'
      initiator:
        description: 'Initiator (user or agent)'
        required: false
        default: 'agent'
      environment:
        description: 'Deployment environment'
        required: false
        default: 'dev'
jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WIF_PROVIDER }}
          service_account: ${{ secrets.GCP_WIF_SA_EMAIL }}
          project_id: lovable-vitana-vers1
      - uses: google-github-actions/setup-gcloud@v2

      # =========================================================================
      # VTID-0541 + VTID-0542: Orphan Deploy Prevention Gate (HARD FAIL)
      # VTID MUST exist in OASIS before deploy - no exceptions
      # BOOTSTRAP: Allow VTID starting with "BOOTSTRAP-" to skip check (one-time fix)
      # =========================================================================
      - name: VTID Existence Check (VTID-0541 + VTID-0542 HARD GATE)
        id: vtid_check
        run: |
          set -e
          VTID="${{ github.event.inputs.vtid }}"
          SERVICE="${{ github.event.inputs.service }}"

          echo "==========================================================================="
          echo "VTID-0542: HARD GATE - VTID must exist in OASIS before deploy"
          echo "==========================================================================="

          # BOOTSTRAP: Allow special bootstrap VTIDs to skip the check (for fixing broken /create)
          if [[ "$VTID" == BOOTSTRAP-* ]]; then
            echo "⚠️  BOOTSTRAP MODE: Skipping VTID existence check for $VTID"
            echo "This is a one-time bootstrap to fix the VTID persistence bug."
            echo "vtid_exists=bootstrap" >> $GITHUB_OUTPUT
            echo "vtid_gateway_url=" >> $GITHUB_OUTPUT
            exit 0
          fi

          echo "Checking if VTID $VTID exists in OASIS ledger..."

          # BOOTSTRAP-CLOUDFLARE-GATEWAY-DOMAIN: Prefer the Cloudflare-fronted
          # custom domain over the raw *.run.app URL. The raw URL is throttled
          # at Google's edge (per-IP GFE rate limit) — VTID lookup calls fail
          # with "Rate exceeded." when the runner's bucket is empty. The
          # custom domain routes via Cloudflare → Cloud Run domain mapping
          # with no per-IP ceiling. Fallback to gcloud lookup only if the
          # custom domain is unreachable.
          GATEWAY_URL="https://gateway.vitanaland.com"
          if ! curl -sS -o /dev/null --max-time 5 "$GATEWAY_URL/alive"; then
            echo "Custom domain unreachable, falling back to gcloud lookup..."
            GATEWAY_URL=$(gcloud run services describe gateway \
              --region=us-central1 \
              --project=lovable-vitana-vers1 \
              --format="value(status.url)" 2>/dev/null || echo "")
          fi

          if [ -z "$GATEWAY_URL" ]; then
            echo "::error::VTID-0542: HARD FAIL - Could not resolve gateway URL"
            echo "Cannot verify VTID existence without gateway. Deploy blocked."
            echo "vtid_exists=fail" >> $GITHUB_OUTPUT
            echo "vtid_gateway_url=" >> $GITHUB_OUTPUT
            exit 1
          fi

          echo "Using GATEWAY_URL=$GATEWAY_URL"
          echo "vtid_gateway_url=$GATEWAY_URL" >> $GITHUB_OUTPUT

          # Query VTID endpoint to check if task exists
          RESPONSE=$(curl -s --max-time 30 "$GATEWAY_URL/api/v1/vtid/$VTID" 2>&1 || echo '{"ok":false,"error":"request_failed"}')
          echo "VTID query response: $RESPONSE"

          # Check if VTID exists
          OK=$(echo "$RESPONSE" | jq -r '.ok // empty')
          ERROR=$(echo "$RESPONSE" | jq -r '.error // empty')

          if [ "$OK" = "true" ]; then
            echo "VTID-0542: ✓ VTID $VTID exists in OASIS ledger - deploy allowed"
            echo "vtid_exists=true" >> $GITHUB_OUTPUT
          elif [ "$ERROR" = "not_found" ]; then
            echo "::error::VTID-0542: HARD FAIL - VTID $VTID not found in OASIS ledger"
            echo ""
            echo "Deploy blocked. VTID must be registered in OASIS before deploy."
            echo ""
            echo "To fix this issue:"
            echo "  1. Create the VTID using POST /api/v1/vtid/allocate, OR"
            echo "  2. Use Command Hub '+Task' button, OR"
            echo "  3. Use Operator Console '/task' command"
            echo ""
            echo "vtid_exists=false" >> $GITHUB_OUTPUT
            exit 1
          else
            echo "::error::VTID-0542: HARD FAIL - OASIS unreachable or invalid response"
            echo "Cannot verify VTID existence. Response: $RESPONSE"
            echo "Deploy blocked until OASIS connectivity is restored."
            echo "vtid_exists=error" >> $GITHUB_OUTPUT
            exit 1
          fi

      # =========================================================================
      # VTID-0416: Governance Evaluate Pre-Check (Hard Gate, Before Deploy)
      # =========================================================================
      - name: Governance Evaluate (VTID-0416)
        id: governance
        run: |
          set -e
          VTID="${{ github.event.inputs.vtid }}"
          SERVICE="${{ github.event.inputs.service }}"
          BRANCH="${{ github.ref_name }}"
          ENVIRONMENT="${{ github.event.inputs.environment }}"

          echo "VTID-0416: Running governance pre-check for $SERVICE deploy"

          # Resolve gateway URL (current deployed instance)
          GATEWAY_URL="${{ steps.vtid_check.outputs.vtid_gateway_url }}"
          if [ -z "$GATEWAY_URL" ]; then
            GATEWAY_URL=$(gcloud run services describe gateway \
              --region=us-central1 \
              --project=lovable-vitana-vers1 \
              --format="value(status.url)" 2>/dev/null || echo "")
          fi

          if [ -z "$GATEWAY_URL" ]; then
            echo "Warning: Could not resolve gateway URL. Proceeding with deploy (first-time deploy scenario)."
            echo "governance_allowed=true" >> $GITHUB_OUTPUT
            echo "governance_gateway_url=" >> $GITHUB_OUTPUT
            exit 0
          fi

          echo "Using GATEWAY_URL=$GATEWAY_URL"
          echo "governance_gateway_url=$GATEWAY_URL" >> $GITHUB_OUTPUT

          # Call governance evaluate endpoint
          RESPONSE=$(curl -s -X POST "$GATEWAY_URL/api/v1/governance/evaluate" \
            -H "Content-Type: application/json" \
            -H "X-VTID: $VTID" \
            -d "{
              \"vtid\": \"$VTID\",
              \"service\": \"$SERVICE\",
              \"action\": \"deploy\",
              \"environment\": \"$ENVIRONMENT\",
              \"branch\": \"$BRANCH\"
            }" 2>&1 || echo '{"ok":false,"error":"request_failed"}')

          echo "Governance response: $RESPONSE"

          # Parse governance response using jq
          ALLOWED=$(echo "$RESPONSE" | jq -r '.allowed // .allow // empty')
          OK=$(echo "$RESPONSE" | jq -r '.ok // empty')
          VIOLATIONS=$(echo "$RESPONSE" | jq -r '.violations // []')
          LEVEL=$(echo "$RESPONSE" | jq -r '.level // "L4"')

          # Check for hard errors (network issues, etc.)
          if [ "$OK" = "false" ]; then
            ERROR=$(echo "$RESPONSE" | jq -r '.error // "unknown"')
            echo "Warning: Governance evaluation returned error: $ERROR"
            echo "Proceeding with deploy (fail-open on governance errors)"
            echo "governance_allowed=true" >> $GITHUB_OUTPUT
            exit 0
          fi

          # Check if allowed
          if [ "$ALLOWED" = "true" ]; then
            echo "VTID-0416: Governance APPROVED deployment for $SERVICE"
            echo "governance_allowed=true" >> $GITHUB_OUTPUT
            echo "governance_level=$LEVEL" >> $GITHUB_OUTPUT
          else
            echo "VTID-0416: Governance DENIED deployment for $SERVICE on branch $BRANCH"
            echo "Violations: $VIOLATIONS"
            echo "governance_allowed=false" >> $GITHUB_OUTPUT
            echo "governance_level=$LEVEL" >> $GITHUB_OUTPUT

            # Emit OASIS event for blocked deploy
            curl -s -X POST "$GATEWAY_URL/api/v1/oasis/events" \
              -H "Content-Type: application/json" \
              -H "X-VTID: $VTID" \
              -d "{
                \"type\": \"deploy.gateway.blocked\",
                \"vtid\": \"$VTID\",
                \"service\": \"$SERVICE\",
                \"branch\": \"$BRANCH\",
                \"source\": \"ci_cd\",
                \"message\": \"Gateway deploy blocked by governance (VTID-0416)\",
                \"details\": {\"violations\": $VIOLATIONS, \"level\": \"$LEVEL\"}
              }" 2>/dev/null || true

            echo "::error::VTID-0416: Governance denied deployment. Check violations above."
            exit 1
          fi

      # =========================================================================
      # Deploy to Cloud Run (Source Deploy)
      # =========================================================================
      - name: Deploy to Cloud Run (Source Deploy)
        id: deploy
        run: |
          SERVICE="${{ github.event.inputs.service }}"
          # Map service name to Cloud Run service name and source path
          case "$SERVICE" in
            gateway)
              CLOUD_RUN_SERVICE="gateway"
              SOURCE_PATH="services/gateway"
              ;;
            oasis-operator)
              CLOUD_RUN_SERVICE="oasis-operator"
              SOURCE_PATH="services/oasis-operator"
              ;;
            oasis-projector)
              CLOUD_RUN_SERVICE="oasis-projector"
              SOURCE_PATH="services/oasis-projector"
              ;;
            vitana-verification-engine)
              CLOUD_RUN_SERVICE="vitana-verification-engine"
              SOURCE_PATH="services/agents/vitana-orchestrator"
              ;;
            cognee-extractor)
              CLOUD_RUN_SERVICE="cognee-extractor"
              SOURCE_PATH="services/agents/cognee-extractor"
              ;;
            worker-runner)
              CLOUD_RUN_SERVICE="worker-runner"
              SOURCE_PATH="services/worker-runner"
              ;;
            *)
              # Use inputs directly for custom services
              CLOUD_RUN_SERVICE="$SERVICE"
              SOURCE_PATH="${{ github.event.inputs.source_path }}"
              if [ -z "$SOURCE_PATH" ]; then
                SOURCE_PATH="services/$SERVICE"
              fi
              ;;
          esac

          echo "Deploying $CLOUD_RUN_SERVICE from $SOURCE_PATH"

          # VTID allocator enablement (gateway-only)
          # VTID-01184: Memory bridge requires ENVIRONMENT=dev-sandbox
          EXTRA_ENV_ARGS=()
          SECRETS_ARGS=()
          if [ "$CLOUD_RUN_SERVICE" = "gateway" ]; then
            # VTID-01184: CRITICAL - ENVIRONMENT enables memory bridge and dev sandbox features
            EXTRA_ENV_ARGS+=(--update-env-vars=VTID_ALLOCATOR_ENABLED=true)
            EXTRA_ENV_ARGS+=(--update-env-vars=ENVIRONMENT=dev-sandbox)
            # VTID-01219: Cloud Run does NOT auto-set GOOGLE_CLOUD_PROJECT; required for Vertex AI Live API
            EXTRA_ENV_ARGS+=(--update-env-vars=GCP_PROJECT_ID=lovable-vitana-vers1)
            # VTID-01225: Cognee Extractor URL for entity extraction
            EXTRA_ENV_ARGS+=(--update-env-vars=COGNEE_EXTRACTOR_URL=https://cognee-extractor-86804897789.us-central1.run.app)
            # VTID-01155: Bind Gemini API key for TTS and chat
            SECRETS_ARGS+=(--update-secrets=GOOGLE_GEMINI_API_KEY=GOOGLE_GEMINI_API_KEY:latest)
            # VTID-01184 + BOOTSTRAP-LLM-ROUTER: OpenAI API key — used for
            # embeddings (VTID-01184) AND for the llm-router's openai adapter
            # so the operator can pick OpenAI per stage from the Command Hub
            # dropdown. Bound from a GitHub Actions secret rather than GCP
            # Secret Manager (no GCP secret needed; same pattern as
            # ANTHROPIC_API_KEY and DEEPSEEK_API_KEY).
            EXTRA_ENV_ARGS+=(--update-env-vars=OPENAI_API_KEY=${{ secrets.OPENAI_API_KEY }})
            # GitHub PAT for workflow dispatch (test runs, ORB monitor, CI/CD integration)
            EXTRA_ENV_ARGS+=(--update-env-vars=GITHUB_SAFE_MERGE_TOKEN=${{ secrets.SAFE_MERGE_TOKEN }})
            # Bind other required secrets
            SECRETS_ARGS+=(--update-secrets=SUPABASE_URL=SUPABASE_URL:latest)
            SECRETS_ARGS+=(--update-secrets=SUPABASE_SERVICE_ROLE=SUPABASE_SERVICE_ROLE:latest)
            # VTID-01184: JWT verification and frontend auth
            SECRETS_ARGS+=(--update-secrets=SUPABASE_JWT_SECRET=SUPABASE_JWT_SECRET:latest)
            SECRETS_ARGS+=(--update-secrets=SUPABASE_ANON_KEY=SUPABASE_ANON_KEY:latest)
            # Appilix native push — API is down (522), secrets not in GCP Secret Manager.
            # Re-enable when Appilix API is restored and secrets are created.
            # Remove stale secret bindings from previous revisions (secrets don't exist in GCP)
            SECRETS_ARGS+=(--remove-secrets=APPILIX_API_KEY)
            SECRETS_ARGS+=(--remove-secrets=APPILIX_APP_KEY)
            # Incident Triage Agent — Claude Managed Agents API key
            EXTRA_ENV_ARGS+=(--update-env-vars=ANTHROPIC_API_KEY=${{ secrets.ANTHROPIC_API_KEY }})
            # BOOTSTRAP-LLM-ROUTER: DeepSeek provider key. Used when
            # llm_routing_policy.policy[stage].primary_provider='deepseek'
            # (or fallback). Without this set, the router's deepseekAdapter
            # reports unavailable and falls through to the configured fallback.
            EXTRA_ENV_ARGS+=(--update-env-vars=DEEPSEEK_API_KEY=${{ secrets.DEEPSEEK_API_KEY }})
            # BOOTSTRAP-DEV-AUTOPILOT-WORKER-QUEUE: route Dev Autopilot LLM
            # calls (plan + execute) through the local worker + Supabase queue
            # instead of the direct Messages API, so they draw on the Claude
            # Pro/Max subscription via the worker's `claude -p` subprocess
            # rather than on the pay-per-token API credit balance.
            #
            # 2026-04-29 history:
            #   - PR #1081 (VTID-02500b) flipped this to false during the
            #     SELF-HEAL-loop incident response, after misdiagnosing the
            #     local worker's max_concurrent=1 bottleneck as a fundamental
            #     architectural problem. It wasn't — bumping MAX_CONCURRENT
            #     env on the worker (or running multiple worker procs)
            #     restores parallelism, and the binary-path bug that started
            #     the whole incident is independently fixed. Operator's
            #     Claude Pro/Max subscription is the cheaper, higher-quality
            #     path for the worker stage, so this commit restores it.
            #
            #   - Concurrent: LLM routing policy is being moved back to
            #     v9 with worker.primary = claude_subscription/claude-opus-4-7,
            #     fallback = vertex/gemini-3-pro-preview (covers worker
            #     downtime / subscription rate-limits without halting the
            #     autopilot).
            # VTID-02686: flipped to false — autopilot-worker daemon was never
            # deployed on Cloud Run, so worker-mode tasks sat in pending
            # forever. Direct-mode runs the LLM call in the gateway via
            # callViaRouter('worker', ...) and creates the PR locally.
            # Provider is now Vertex / gemini-3.1-pro-preview per the new
            # active llm_routing_policy. Re-flip to true if/when the worker
            # daemon ships as a Cloud Run service.
            EXTRA_ENV_ARGS+=(--update-env-vars=DEV_AUTOPILOT_USE_WORKER=false)
            # VTID-02686: worker_owns_pr requires the worker daemon (above);
            # gateway-side PR creation runs as part of runExecutionSession
            # when worker mode is off.
            EXTRA_ENV_ARGS+=(--update-env-vars=AUTOPILOT_WORKER_OWNS_PR=false)
            # BOOTSTRAP-DEV-AUTOPILOT-WATCHER-LIVE: flip the CI / merge /
            # deploy watchers out of DRY_RUN mode. Queries GitHub for real
            # check runs, auto-merges (squash) when all checks pass and
            # risk_class ∈ {low, medium}, follows OASIS deploy events for the
            # verification stage. Delete this line to fall back to synthetic
            # dry-run transitions that never touch GitHub.
            EXTRA_ENV_ARGS+=(--update-env-vars=DEV_AUTOPILOT_WATCHER_LIVE=true)
            # VTID-01973 / VTID-01975 / VTID-01976: enable the Vitana Intent
            # Engine routes (/intents, /intent-matches, /intent-board, etc.).
            # Without this flag the routes don't mount on boot.
            EXTRA_ENV_ARGS+=(--update-env-vars=FEATURE_INTENT_ENGINE_A=true)
            # VTID-02000: Marketplace sync scheduler secret (shared with
            # .github/workflows/MARKETPLACE-SYNC-CRON.yml). Gateway's
            # /api/v1/internal/marketplace/sync/:network route validates it
            # with timingSafeEqual and returns 401 if it doesn't match.
            EXTRA_ENV_ARGS+=(--update-env-vars=MARKETPLACE_SYNC_SECRET=${{ secrets.MARKETPLACE_SYNC_SECRET }})
            # VTID-01270A: Events/community data now uses platform SUPABASE_URL/SUPABASE_SERVICE_ROLE (already bound as GCP secrets above)
            # VTID-01928: Google OAuth for Gmail / Calendar / Contacts / YouTube connectors.
            # Client ID is public; secret lives in GSM as google-oauth-client-secret.
            EXTRA_ENV_ARGS+=(--update-env-vars=GOOGLE_OAUTH_CLIENT_ID=86804897789-hej1ferhlfnjcjtn5hd899r07ssld7en.apps.googleusercontent.com)
            SECRETS_ARGS+=(--update-secrets=GOOGLE_OAUTH_CLIENT_SECRET=google-oauth-client-secret:latest)
            # Callback base URL (gateway) and post-OAuth redirect base (community-app).
            EXTRA_ENV_ARGS+=(--update-env-vars=GATEWAY_PUBLIC_URL=https://gateway-q74ibpv6ia-uc.a.run.app)
            EXTRA_ENV_ARGS+=(--update-env-vars=APP_URL=https://community-app-q74ibpv6ia-uc.a.run.app)
            # VTID-01981: Routines ingest token — required by /api/v1/routines POST/PATCH
            # so daily Claude Code remote agents can authenticate without user JWTs.
            EXTRA_ENV_ARGS+=(--update-env-vars=ROUTINE_INGEST_TOKEN=${{ secrets.ROUTINE_INGEST_TOKEN }})
            # VTID-02030d/e: Google Chat webhook for human-in-the-loop pings
            # (voice quarantine, architectural recommendations, etc.).
            # Same secret used by DAILY-STATUS-UPDATE.yml's existing pings.
            # Quoted because the webhook URL contains '&' (key=...&token=...)
            # which bash would otherwise read as a background-process token.
            EXTRA_ENV_ARGS+=("--update-env-vars=GCHAT_COMMANDHUB_WEBHOOK=${{ secrets.VITANA_CHAT_WEBHOOK }}")
          fi

          # VTID-01225: Cognee extractor — internal ingress, Gemini LLM via API key
          if [ "$CLOUD_RUN_SERVICE" = "cognee-extractor" ]; then
            EXTRA_ENV_ARGS+=(--update-env-vars=LLM_PROVIDER=google)
            EXTRA_ENV_ARGS+=(--update-env-vars=LLM_MODEL=gemini/gemini-2.0-flash)
            EXTRA_ENV_ARGS+=(--update-env-vars=GOOGLE_CLOUD_PROJECT=lovable-vitana-vers1)
            EXTRA_ENV_ARGS+=(--update-env-vars=VERTEX_LOCATION=us-central1)
            EXTRA_ENV_ARGS+=(--update-env-vars=ENV=production)
            # Cognee SDK needs API key for Gemini LLM calls (not ADC)
            SECRETS_ARGS+=(--update-secrets=GOOGLE_GEMINI_API_KEY=GOOGLE_GEMINI_API_KEY:latest)
            # Agents registry self-registration
            GATEWAY_URL=$(gcloud run services describe gateway --region=us-central1 --format='value(status.url)' 2>/dev/null || echo "")
            if [ -n "$GATEWAY_URL" ]; then
              EXTRA_ENV_ARGS+=(--update-env-vars=GATEWAY_URL=$GATEWAY_URL)
            fi
          fi

          # VTID-01250: OpenClaw bridge — Supabase secrets for heartbeat and OASIS events
          if [ "$CLOUD_RUN_SERVICE" = "openclaw-bridge" ]; then
            SECRETS_ARGS+=(--update-secrets=SUPABASE_URL=SUPABASE_URL:latest)
            SECRETS_ARGS+=(--update-secrets=SUPABASE_SERVICE_ROLE=SUPABASE_SERVICE_ROLE:latest)
          fi

          # OASIS Projector — gateway URL for agents registry self-registration
          if [ "$CLOUD_RUN_SERVICE" = "oasis-projector" ]; then
            GATEWAY_URL=$(gcloud run services describe gateway --region=us-central1 --format='value(status.url)' 2>/dev/null || echo "")
            if [ -n "$GATEWAY_URL" ]; then
              EXTRA_ENV_ARGS+=(--update-env-vars=GATEWAY_URL=$GATEWAY_URL)
            fi
          fi

          # VTID-01200: Worker Runner — needs gateway URL, Supabase, and Claude API config
          if [ "$CLOUD_RUN_SERVICE" = "worker-runner" ]; then
            # Resolve gateway URL dynamically from Cloud Run
            GATEWAY_URL=$(gcloud run services describe gateway --region=us-central1 --format='value(status.url)' 2>/dev/null || echo "")
            if [ -z "$GATEWAY_URL" ]; then
              echo "::error::Cannot resolve gateway URL for worker-runner"
              exit 1
            fi
            EXTRA_ENV_ARGS+=(--update-env-vars=GATEWAY_URL=$GATEWAY_URL)
            EXTRA_ENV_ARGS+=(--update-env-vars=GOOGLE_CLOUD_PROJECT=lovable-vitana-vers1)
            EXTRA_ENV_ARGS+=(--update-env-vars=AUTOPILOT_LOOP_ENABLED=true)
            EXTRA_ENV_ARGS+=(--update-env-vars=POLL_INTERVAL_MS=5000)
            SECRETS_ARGS+=(--update-secrets=SUPABASE_URL=SUPABASE_URL:latest)
            SECRETS_ARGS+=(--update-secrets=SUPABASE_SERVICE_ROLE=SUPABASE_SERVICE_ROLE:latest)
            SECRETS_ARGS+=(--update-secrets=ANTHROPIC_API_KEY=ANTHROPIC_API_KEY:latest)
          fi

          # VTID-01175: Vitana Verification Engine — needs gateway URL for agents registry heartbeat
          if [ "$CLOUD_RUN_SERVICE" = "vitana-verification-engine" ]; then
            GATEWAY_URL=$(gcloud run services describe gateway --region=us-central1 --format='value(status.url)' 2>/dev/null || echo "")
            if [ -n "$GATEWAY_URL" ]; then
              EXTRA_ENV_ARGS+=(--update-env-vars=OASIS_GATEWAY_URL=$GATEWAY_URL)
            fi
          fi

          # Pre-deploy: remove stale env vars and secret refs from previous revisions.
          if [ "$CLOUD_RUN_SERVICE" = "gateway" ]; then
            echo "Cleaning stale env vars and secret refs before deploy..."
            # Remove retired LOVABLE_SUPABASE_* env vars (events now use platform SUPABASE_URL)
            gcloud run services update "$CLOUD_RUN_SERVICE" \
              --region=us-central1 \
              --project=lovable-vitana-vers1 \
              --remove-env-vars=LOVABLE_SUPABASE_URL,LOVABLE_SUPABASE_SERVICE_ROLE \
              --quiet 2>/dev/null || echo "No stale LOVABLE env vars to remove (already clean)"
          fi

          # Build deploy args
          DEPLOY_ARGS=(
            --source="$SOURCE_PATH"
            --region=us-central1
            --project=lovable-vitana-vers1
            --allow-unauthenticated
          )

          # Cognee-extractor: internal-only ingress, override custom SA to avoid IAM actAs error
          if [ "$CLOUD_RUN_SERVICE" = "cognee-extractor" ]; then
            DEPLOY_ARGS+=(--ingress=internal-and-cloud-load-balancing)
            DEPLOY_ARGS+=(--service-account=86804897789-compute@developer.gserviceaccount.com)
          fi

          # VTID-02037: pin gateway to a single instance so ORB voice
          # sessions (held in an in-memory liveSessions Map) are never
          # split across instances. Cookie-based affinity (VTID-02034)
          # didn't work cross-origin because Cloud Run's session-affinity
          # cookie defaults to SameSite=Lax. Sticking the gateway at
          # max-instances=1 is a temporary brake until a shared session
          # store (Supabase/Redis) lands. Other gateway endpoints lose
          # horizontal scaling but the current test load fits one
          # instance comfortably.
          if [ "$CLOUD_RUN_SERVICE" = "gateway" ]; then
            DEPLOY_ARGS+=(--max-instances=1)
            DEPLOY_ARGS+=(--min-instances=1)
          fi


          gcloud run deploy "$CLOUD_RUN_SERVICE" \
            "${DEPLOY_ARGS[@]}" \
            "${EXTRA_ENV_ARGS[@]}" \
            "${SECRETS_ARGS[@]}" \
            --quiet

          # Get service URL
          URL=$(gcloud run services describe "$CLOUD_RUN_SERVICE" --region=us-central1 --format='value(status.url)')
          echo "service_url=$URL" >> $GITHUB_OUTPUT
          echo "cloud_run_service=$CLOUD_RUN_SERVICE" >> $GITHUB_OUTPUT

          # Health check (skip for internal-ingress services — not reachable from CI)
          if [ "$CLOUD_RUN_SERVICE" = "cognee-extractor" ]; then
            echo "Skipping health check for internal-ingress service: $CLOUD_RUN_SERVICE"
            echo "Service deployed successfully at $URL"
          else
            echo "Running health check: $URL${{ github.event.inputs.health_path }}"
            # Retry health check up to 6 times with 10s delay (services like worker-runner
            # need time to register with orchestrator before reporting healthy)
            HEALTH_OK=false
            for i in 1 2 3 4 5 6; do
              if curl -fsS "$URL${{ github.event.inputs.health_path }}" -H "X-VTID: ${{ github.event.inputs.vtid }}" 2>/dev/null; then
                HEALTH_OK=true
                break
              fi
              echo "Health check attempt $i failed, retrying in 10s..."
              sleep 10
            done
            if [ "$HEALTH_OK" != "true" ]; then
              echo "::error::Health check failed after 6 attempts"
              exit 1
            fi
          fi

      # =========================================================================
      # VTID-0416: Post-Deploy Smoke Tests
      # =========================================================================
      - name: Post-Deploy Smoke Tests (VTID-0416)
        id: smoke_tests
        if: success() && github.event.inputs.service == 'gateway'
        env:
          GATEWAY_URL: ${{ steps.deploy.outputs.service_url }}
        run: |
          set -e
          echo "VTID-0416: Running post-deploy smoke tests on $GATEWAY_URL"

          # 1) Health endpoint
          echo "Smoke Test 1/3: Health check (/alive)"
          HEALTH=$(curl -fsS "$GATEWAY_URL/alive" 2>&1 || echo '{"error":"failed"}')
          echo "$HEALTH" | jq '.' || echo "$HEALTH"
          if echo "$HEALTH" | jq -e '.error' > /dev/null 2>&1; then
            echo "::error::VTID-0416: Health check failed"
            exit 1
          fi
          echo "✓ Health check passed"

          # 2) Governance Categories - must be JSON with vtid=VTID-0409
          echo "Smoke Test 2/3: Governance Categories"
          CATEGORIES=$(curl -fsS "$GATEWAY_URL/api/v1/governance/categories" 2>&1 || echo '{"error":"failed"}')
          echo "$CATEGORIES" | jq '.' || echo "$CATEGORIES"
          VTID_FIELD=$(echo "$CATEGORIES" | jq -r '.vtid // empty')
          if [ "$VTID_FIELD" != "VTID-0409" ]; then
            echo "::error::VTID-0416: Expected governance categories vtid=VTID-0409, got '$VTID_FIELD'"
            exit 1
          fi
          echo "✓ Governance categories check passed (vtid=$VTID_FIELD)"

          # 3) Governance History - should be ok:true JSON
          echo "Smoke Test 3/3: Governance History"
          HISTORY=$(curl -fsS "$GATEWAY_URL/api/v1/governance/history?limit=1" 2>&1 || echo '{"ok":false,"error":"failed"}')
          echo "$HISTORY" | jq '.' || echo "$HISTORY"
          OK_FIELD=$(echo "$HISTORY" | jq -r '.ok // empty')
          if [ "$OK_FIELD" != "true" ]; then
            echo "::error::VTID-0416: Governance history did not return ok:true"
            exit 1
          fi
          echo "✓ Governance history check passed"

          # 4) ORB Live API Readiness - verify Vertex AI config is present
          echo "Smoke Test 4/5: ORB Live API Readiness (Vertex pipeline)"
          ORB_HEALTH=$(curl -fsS "$GATEWAY_URL/api/v1/orb/health" 2>&1 || echo '{"error":"failed"}')
          echo "$ORB_HEALTH" | jq '.gemini_live' || echo "$ORB_HEALTH"

          LIVE_ENABLED=$(echo "$ORB_HEALTH" | jq -r '.gemini_live.enabled // false')
          LIVE_PROJECT=$(echo "$ORB_HEALTH" | jq -r '.gemini_live.vertex_project_id // "EMPTY"')
          LIVE_AUTH=$(echo "$ORB_HEALTH" | jq -r '.gemini_live.google_auth_ready // false')

          if [ "$LIVE_ENABLED" != "true" ]; then
            echo "::error::VTID-0416: ORB Live API not enabled (project=$LIVE_PROJECT, auth=$LIVE_AUTH)"
            exit 1
          fi
          echo "✓ ORB Live API check passed (project=$LIVE_PROJECT, auth=$LIVE_AUTH)"

          # 5) VTID-LIVEKIT-FOUNDATION: ORB LiveKit pipeline readiness — verifies the
          # standby pipeline's gateway routes are mounted. Per the parallel-architecture
          # plan, BOTH pipelines must be deploy-healthy on every release; we never want
          # to discover the standby is broken at flip time.
          echo "Smoke Test 5/5: ORB LiveKit pipeline readiness (standby)"
          LIVEKIT_HEALTH=$(curl -fsS "$GATEWAY_URL/api/v1/orb/livekit/health" 2>&1 || echo '{"error":"failed"}')
          echo "$LIVEKIT_HEALTH" | jq '.' || echo "$LIVEKIT_HEALTH"

          LK_OK=$(echo "$LIVEKIT_HEALTH" | jq -r '.ok // false')
          LK_ACTIVE=$(echo "$LIVEKIT_HEALTH" | jq -r '.active_provider // "vertex"')

          if [ "$LK_OK" != "true" ]; then
            echo "::error::VTID-LIVEKIT-FOUNDATION: ORB LiveKit standby route unhealthy (ok=$LK_OK)"
            exit 1
          fi
          echo "✓ ORB LiveKit standby route healthy (active_provider=$LK_ACTIVE)"

          # When LiveKit is the *active* provider (post-flip), additionally verify the
          # agent worker is reachable. Until the operator flips, this section is a
          # no-op pass.
          if [ "$LK_ACTIVE" = "livekit" ]; then
            echo "Active provider is livekit — probing orb-agent worker..."
            AGENT_REACHABLE=$(echo "$LIVEKIT_HEALTH" | jq -r '.agent_worker_reachable // false')
            if [ "$AGENT_REACHABLE" != "true" ]; then
              echo "::error::VTID-LIVEKIT-FOUNDATION: LiveKit is ACTIVE but orb-agent worker is unreachable"
              exit 1
            fi
            echo "✓ orb-agent worker reachable"
          fi

          echo ""
          echo "==========================================="
          echo "VTID-0416: All smoke tests PASSED (5/5)"
          echo "==========================================="

      # =========================================================================
      # VTID-01917: Post-Deploy Visual Verification (Playwright Screenshots)
      # Advisory only as of 2026-05-08: this step verifies a hardcoded list
      # of pages (overview, self-healing, services-health) regardless of
      # what the deploy actually changed. The /infrastructure/* pages have
      # CSP-blocked inline scripts that fail the must-contain assertions on
      # every deploy — including deploys that touch only gateway routes.
      # That false positive was reverting otherwise-clean autopilot merges
      # (PR #1990 was un-shipped on 2026-05-08 with smoke tests green).
      # CLAUDE.md mandates "screenshot what you changed, not 20 pages" —
      # a diff-aware visual gate is the proper fix; until then, page-load
      # failures are still logged but don't block the deploy. Cloud Run
      # smoke tests above remain the hard gate on deploy correctness.
      # =========================================================================
      - name: Visual Verification — Playwright Screenshots (VTID-01917, advisory)
        id: visual_verify
        if: success() && github.event.inputs.service == 'gateway'
        continue-on-error: true
        env:
          GATEWAY_URL: ${{ steps.deploy.outputs.service_url }}
          SCREENSHOT_DIR: /tmp/visual-verify
        run: |
          set -e
          echo "VTID-01917: Running post-deploy visual verification"

          # Install Playwright + Chromium in the runner
          cd e2e
          npm ci --ignore-scripts 2>/dev/null || npm install 2>/dev/null
          npx playwright install chromium --with-deps 2>/dev/null

          # Run visual verification script
          mkdir -p "$SCREENSHOT_DIR"
          npx tsx ci-visual-verify.ts

      # Screenshot artifact upload removed — never used for debugging and was
      # the primary consumer of the private-repo artifact storage quota.
      # Workflow logs show pass/fail and the exact failure message; re-add
      # this step temporarily if a specific deploy ever needs deep debugging.

      # =========================================================================
      # VTID-0510: Record Software Version
      # =========================================================================
      - name: Record Software Version (VTID-0510)
        if: success()
        env:
          GATEWAY_URL: ${{ github.event.inputs.service == 'gateway' && steps.deploy.outputs.service_url || 'https://gateway-q74ibpv6ia-uc.a.run.app' }}
        run: |
          # Record deployment version in OASIS via Gateway API
          SERVICE_NAME="${{ steps.deploy.outputs.cloud_run_service }}"
          GIT_COMMIT="${{ github.sha }}"

          # Call operator API to record deployment — fail the job if it doesn't stick,
          # otherwise the Release Feed silently drifts and supervisors can't trust it.
          HTTP_CODE=$(curl -sS -o /tmp/record_resp.json -w "%{http_code}" \
            "${GATEWAY_URL}/api/v1/operator/deployments" \
            -X POST \
            -H "Content-Type: application/json" \
            -H "X-VTID: ${{ github.event.inputs.vtid }}" \
            -d "{\"service\":\"${SERVICE_NAME}\",\"git_commit\":\"${GIT_COMMIT}\",\"deploy_type\":\"normal\",\"initiator\":\"${{ github.event.inputs.initiator }}\",\"environment\":\"dev-sandbox\"}")
          echo "Record Software Version HTTP $HTTP_CODE"
          cat /tmp/record_resp.json || true
          echo ""
          if [ "$HTTP_CODE" != "201" ]; then
            echo "::error::Failed to record software version (HTTP $HTTP_CODE). Release Feed will be incomplete."
            exit 1
          fi

      # =========================================================================
      # VTID-0416: Emit OASIS Event for Deploy Success
      # =========================================================================
      - name: Emit OASIS Deploy Success Event (VTID-0416)
        if: success()
        env:
          GATEWAY_URL: ${{ github.event.inputs.service == 'gateway' && steps.deploy.outputs.service_url || 'https://gateway-q74ibpv6ia-uc.a.run.app' }}
        run: |
          VTID="${{ github.event.inputs.vtid }}"
          SERVICE="${{ steps.deploy.outputs.cloud_run_service }}"
          BRANCH="${{ github.ref_name }}"
          GIT_COMMIT="${{ github.sha }}"
          ENVIRONMENT="${{ github.event.inputs.environment }}"

          echo "VTID-0416: Emitting deploy success event"

          # Emit OASIS event for successful deploy
          curl -s -X POST "${GATEWAY_URL}/api/v1/oasis/events" \
            -H "Content-Type: application/json" \
            -H "X-VTID: $VTID" \
            -d "{
              \"type\": \"deploy.$SERVICE.success\",
              \"vtid\": \"$VTID\",
              \"service\": \"$SERVICE\",
              \"branch\": \"$BRANCH\",
              \"source\": \"ci_cd\",
              \"message\": \"$SERVICE deployed via VTID-0416 governed pipeline\",
              \"details\": {
                \"git_commit\": \"$GIT_COMMIT\",
                \"environment\": \"$ENVIRONMENT\",
                \"governance_approved\": true,
                \"smoke_tests_passed\": true,
                \"workflow_run_id\": \"${{ github.run_id }}\"
              }
            }" 2>/dev/null || echo "Warning: Failed to emit success event (non-fatal)"

          echo "VTID-0416: Deploy completed successfully via governed pipeline"

      # =========================================================================
      # VTID-01080: OASIS Terminal Completion Gate (HARD FAIL)
      # A task is ONLY "done" if the pipeline writes a terminal completion update.
      # If this write fails, the entire workflow FAILS.
      # =========================================================================
      - name: OASIS Terminal Completion Gate (VTID-01080 HARD GATE)
        id: terminal_completion
        if: success()
        env:
          # Always use the gateway URL for OASIS completion (not the deployed service URL)
          GATEWAY_URL: ${{ github.event.inputs.service == 'gateway' && steps.deploy.outputs.service_url || 'https://gateway-q74ibpv6ia-uc.a.run.app' }}
        run: |
          set -e
          VTID="${{ github.event.inputs.vtid }}"
          SERVICE="${{ steps.deploy.outputs.cloud_run_service }}"

          echo "==========================================================================="
          echo "VTID-01080: HARD GATE - Terminal Completion Write Required"
          echo "==========================================================================="

          # Skip terminal completion for BOOTSTRAP VTIDs
          if [[ "$VTID" == BOOTSTRAP-* ]]; then
            echo "⚠️  BOOTSTRAP MODE: Skipping terminal completion for $VTID"
            echo "terminal_completion=skipped" >> $GITHUB_OUTPUT
            exit 0
          fi

          echo "Writing terminal completion for VTID: $VTID"

          # VTID-01984 (hardened): Fetch Supabase service token for bearer auth.
          # Graceful fallback: if Secret Manager access is unavailable (e.g. the WIF SA
          # lacks secretmanager.versions.access) the gate still runs unauthenticated —
          # the /complete endpoint carries no requireAuth guard, so the call succeeds
          # either way. Only a true API error (ok!=true) triggers the hard fail.
          SUPABASE_SERVICE_ROLE=$(gcloud secrets versions access latest \
            --secret=SUPABASE_SERVICE_ROLE \
            --project=lovable-vitana-vers1 2>/dev/null || echo "")
          if [ -z "$SUPABASE_SERVICE_ROLE" ]; then
            echo "Note: SUPABASE_SERVICE_ROLE unavailable from Secret Manager — calling /complete without auth"
          else
            echo "Note: SUPABASE_SERVICE_ROLE fetched — calling /complete with bearer auth"
          fi

          # Step 1: Call terminal completion endpoint
          if [ -n "$SUPABASE_SERVICE_ROLE" ]; then
            RESPONSE=$(curl -sS --max-time 30 -X POST "${GATEWAY_URL}/api/v1/oasis/tasks/${VTID}/complete" \
              -H "Content-Type: application/json" \
              -H "X-VTID: $VTID" \
              -H "Authorization: Bearer $SUPABASE_SERVICE_ROLE" \
              -d '{"terminal_outcome":"success"}' 2>&1 || echo '{"ok":false,"error":"request_failed"}')
          else
            RESPONSE=$(curl -sS --max-time 30 -X POST "${GATEWAY_URL}/api/v1/oasis/tasks/${VTID}/complete" \
              -H "Content-Type: application/json" \
              -H "X-VTID: $VTID" \
              -d '{"terminal_outcome":"success"}' 2>&1 || echo '{"ok":false,"error":"request_failed"}')
          fi

          echo "Terminal completion response: $RESPONSE"

          # Parse response
          OK=$(echo "$RESPONSE" | jq -r '.ok // empty')
          ERROR=$(echo "$RESPONSE" | jq -r '.error // empty')
          ALREADY_COMPLETED=$(echo "$RESPONSE" | jq -r '.already_completed // empty')

          if [ "$OK" != "true" ]; then
            echo "::error::VTID-01080: HARD FAIL - Terminal completion write failed"
            echo "Error: $ERROR"
            echo "Response: $RESPONSE"

            # Emit failure event
            curl -s -X POST "${GATEWAY_URL}/api/v1/oasis/events" \
              -H "Content-Type: application/json" \
              -H "X-VTID: $VTID" \
              -d "{
                \"type\": \"vtid.lifecycle.completion_gate.failed\",
                \"vtid\": \"$VTID\",
                \"service\": \"$SERVICE\",
                \"source\": \"ci_cd\",
                \"status\": \"error\",
                \"message\": \"Terminal completion gate failed for $VTID\",
                \"details\": {
                  \"error\": \"$ERROR\",
                  \"workflow_run_id\": \"${{ github.run_id }}\"
                }
              }" 2>/dev/null || true

            echo "terminal_completion=failed" >> $GITHUB_OUTPUT
            exit 1
          fi

          echo "terminal_completion=success" >> $GITHUB_OUTPUT

          # Step 2: Verify terminal completion state
          echo "Verifying terminal completion state..."
          VERIFY_RESPONSE=$(curl -sS --max-time 30 "${GATEWAY_URL}/api/v1/oasis/tasks?limit=2000" 2>&1 || echo '[]')

          TASK_STATE=$(echo "$VERIFY_RESPONSE" | jq --arg v "$VTID" '.[] | select(.vtid==$v) | {vtid,status,is_terminal,terminal_outcome}' 2>/dev/null || echo '{}')
          echo "Task state: $TASK_STATE"

          STATUS=$(echo "$TASK_STATE" | jq -r '.status // empty')
          IS_TERMINAL=$(echo "$TASK_STATE" | jq -r '.is_terminal // empty')
          TERMINAL_OUTCOME=$(echo "$TASK_STATE" | jq -r '.terminal_outcome // empty')

          if [ "$STATUS" != "completed" ] || [ "$IS_TERMINAL" != "true" ] || [ "$TERMINAL_OUTCOME" != "success" ]; then
            echo "::error::VTID-01080: HARD FAIL - Terminal state verification failed"
            echo "Expected: status=completed, is_terminal=true, terminal_outcome=success"
            echo "Got: status=$STATUS, is_terminal=$IS_TERMINAL, terminal_outcome=$TERMINAL_OUTCOME"
            exit 1
          fi

          if [ "$ALREADY_COMPLETED" = "true" ]; then
            echo "VTID-01080: ✓ Task $VTID already terminal (idempotent)"
          else
            echo "VTID-01080: ✓ Task $VTID marked as terminal completion SUCCESS"
          fi

          echo ""
          echo "==========================================================================="
          echo "VTID-01080: Terminal Completion Gate PASSED"
          echo "==========================================================================="

      # =========================================================================
      # VTID-0416: Emit OASIS Event for Deploy Failure
      # =========================================================================
      - name: Emit OASIS Deploy Failure Event (VTID-0416)
        if: failure()
        run: |
          VTID="${{ github.event.inputs.vtid }}"
          SERVICE="${{ github.event.inputs.service }}"
          BRANCH="${{ github.ref_name }}"
          GIT_COMMIT="${{ github.sha }}"

          # Try to get gateway URL if available
          GATEWAY_URL="${{ steps.governance.outputs.governance_gateway_url }}"
          if [ -z "$GATEWAY_URL" ]; then
            GATEWAY_URL=$(gcloud run services describe gateway \
              --region=us-central1 \
              --project=lovable-vitana-vers1 \
              --format="value(status.url)" 2>/dev/null || echo "")
          fi

          if [ -n "$GATEWAY_URL" ]; then
            echo "VTID-0416: Emitting deploy failure event to $GATEWAY_URL"

            curl -s -X POST "${GATEWAY_URL}/api/v1/oasis/events" \
              -H "Content-Type: application/json" \
              -H "X-VTID: $VTID" \
              -d "{
                \"type\": \"deploy.$SERVICE.failed\",
                \"vtid\": \"$VTID\",
                \"service\": \"$SERVICE\",
                \"branch\": \"$BRANCH\",
                \"source\": \"ci_cd\",
                \"message\": \"$SERVICE deploy failed (governance or smoke tests)\",
                \"details\": {
                  \"git_commit\": \"$GIT_COMMIT\",
                  \"workflow_run_id\": \"${{ github.run_id }}\",
                  \"failure_stage\": \"unknown\"
                }
              }" 2>/dev/null || true
          fi

          # VTID-01841: Trigger retry-reset via completion endpoint
          # This resets the task to 'scheduled' for retry (if under max failure count)
          if [[ "$VTID" != BOOTSTRAP-* ]] && [ -n "$GATEWAY_URL" ]; then
            echo "VTID-01841: Calling completion endpoint to trigger retry-reset"
            # VTID-01984 (hardened): Fetch auth token for retry-reset (graceful — same pattern as success path)
            SUPABASE_SVC_ROLE_FAIL=$(gcloud secrets versions access latest \
              --secret=SUPABASE_SERVICE_ROLE \
              --project=lovable-vitana-vers1 2>/dev/null || echo "")
            if [ -n "$SUPABASE_SVC_ROLE_FAIL" ]; then
              RETRY_RESPONSE=$(curl -s -X POST "${GATEWAY_URL}/api/v1/oasis/tasks/${VTID}/complete" \
                -H "Content-Type: application/json" \
                -H "X-VTID: $VTID" \
                -H "Authorization: Bearer $SUPABASE_SVC_ROLE_FAIL" \
                -d '{"terminal_outcome":"failed"}' 2>/dev/null || echo '{"ok":false}')
            else
              RETRY_RESPONSE=$(curl -s -X POST "${GATEWAY_URL}/api/v1/oasis/tasks/${VTID}/complete" \
                -H "Content-Type: application/json" \
                -H "X-VTID: $VTID" \
                -d '{"terminal_outcome":"failed"}' 2>/dev/null || echo '{"ok":false}')
            fi
            echo "VTID-01841: Retry-reset response: $RETRY_RESPONSE"
          fi

          echo "VTID-0416: Deploy failed - check workflow logs for details"
