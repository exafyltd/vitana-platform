name: OPS — Enable Journey Conversation V2 on staging

# Flips the `vitana_journey_conversation_v2_enabled` system control ON via the
# STAGING gateway's governed controls endpoint, so V2 can be tested on
# preview-gateway.vitanaland.com. Runs from a GitHub runner (Claude Code remote
# sessions have no gateway egress). Header-authed (dev_admin) — same pattern as
# the spec-approval ops workflow; no service-role key.
#
# NOTE: staging gateway shares the PROD Supabase (system_controls is a shared
# table). Prod gateway has no V2 code yet, so it ignores the flag — enabling
# here changes STAGING behavior only. See the workflow summary for the
# publish-time caveat.

on:
  workflow_dispatch:
    inputs:
      enabled:
        description: 'true to enable, false to disable'
        required: false
        default: 'true'
  push:
    branches: ['claude/nifty-rubin-7yqpai']
    paths: ['.github/workflows/OPS-ENABLE-JOURNEY-V2-STAGING.yml']

env:
  STAGING_GATEWAY: 'https://gateway-staging-q74ibpv6ia-uc.a.run.app'
  CONTROL_KEY: 'vitana_journey_conversation_v2_enabled'

jobs:
  enable:
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' || contains(github.event.head_commit.message, '[run-enable-v2-staging]')
    steps:
      - name: Confirm staging gateway is serving the V2 build
        run: |
          set -euo pipefail
          # The /me-less health endpoint proves the staging revision is live.
          HEALTH=$(curl -sS "$STAGING_GATEWAY/api/v1/admin/health" || true)
          echo "health: $HEALTH"
          ENVV=$(echo "$HEALTH" | jq -r '.env // empty')
          if [ "$ENVV" != "staging" ]; then
            echo "::warning::admin/health did not report env=staging (got '$ENVV') — continuing, but verify the target."
          fi

      - name: Set the control via the staging governed endpoint
        env:
          DESIRED: ${{ (contains(github.event.head_commit.message, '[v2-off]') && 'false') || github.event.inputs.enabled || 'true' }}
        run: |
          set -euo pipefail
          RESP=$(curl -sS -X POST "$STAGING_GATEWAY/api/v1/governance/controls/$CONTROL_KEY" \
            -H 'Content-Type: application/json' \
            -H 'x-user-id: d.stevanovic@exafy.io' \
            -H 'x-user-role: dev_admin' \
            -d "{\"enabled\": ${DESIRED}, \"reason\": \"Journey Conversation V2 staging testing (VTID-03307)\"}")
          echo "$RESP"
          OK=$(echo "$RESP" | jq -r '.ok')
          if [ "$OK" != "true" ]; then echo "::error::control update failed: $RESP"; exit 1; fi

      - name: Read back and verify
        env:
          DESIRED: ${{ (contains(github.event.head_commit.message, '[v2-off]') && 'false') || github.event.inputs.enabled || 'true' }}
        run: |
          set -euo pipefail
          RESP=$(curl -sS "$STAGING_GATEWAY/api/v1/governance/controls/$CONTROL_KEY" \
            -H 'x-user-id: d.stevanovic@exafy.io' -H 'x-user-role: dev_admin')
          echo "$RESP"
          ENABLED=$(echo "$RESP" | jq -r '.data.enabled // .enabled // empty')
          if [ "$ENABLED" != "$DESIRED" ]; then
            echo "::error::read-back mismatch: wanted $DESIRED, got '$ENABLED' ($RESP)"; exit 1
          fi
          echo "### Control $CONTROL_KEY = $ENABLED on staging ✅" >> "$GITHUB_STEP_SUMMARY"
          echo "Test at: https://preview-gateway.vitanaland.com" >> "$GITHUB_STEP_SUMMARY"
