name: Regen Screens Catalog (DEV-COMHU-0413)
# Auto-regenerates services/gateway/specs/dev-screen-inventory-v1.json and
# services/gateway/src/frontend/command-hub/navigation-config.js from the
# canonical source-of-truth files in this repo and in exafyltd/vitana-v1.
#
# Triggers:
#   - Push to main touching nav files in this repo (DEV portion)
#   - Repository dispatch from vitana-v1 when admin-navigation.ts or screen-id.ts change (ADM/COM portion)
#   - Manual workflow_dispatch
#
# When the regen produces a diff, this workflow auto-opens a PR and enables
# auto-merge so it lands once CI passes — no human approval needed for a
# pure data sync.

on:
  push:
    branches: [main]
    paths:
      - 'services/gateway/src/frontend/command-hub/app.js'
      - 'services/gateway/specs/screens-overrides.json'
      - 'services/gateway/scripts/regen-screens-catalog.mjs'
  repository_dispatch:
    types: [regen-screens-catalog]
  workflow_dispatch: {}

permissions:
  contents: write
  pull-requests: write

jobs:
  regen:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout vitana-platform
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Checkout vitana-v1 (read-only)
        id: checkout_v1
        continue-on-error: true
        uses: actions/checkout@v4
        with:
          repository: exafyltd/vitana-v1
          token: ${{ secrets.VITANA_V1_READ_TOKEN || secrets.GITHUB_TOKEN }}
          ref: main
          path: vitana-v1

      - name: Note v1 checkout outcome
        if: steps.checkout_v1.outcome != 'success'
        run: |
          echo "::warning::vitana-v1 checkout failed — VITANA_V1_READ_TOKEN secret likely missing. ADMIN rows will be preserved from existing spec; DEV side will still regenerate."

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'

      - name: Run regen script
        env:
          VITANA_V1_ROOT: ${{ github.workspace }}/vitana-v1
        run: node services/gateway/scripts/regen-screens-catalog.mjs

      - name: Validate dev-frontend spec
        run: node services/gateway/scripts/validate-dev-frontend-spec.mjs

      - name: Detect changes
        id: diff
        run: |
          if git diff --quiet services/gateway/specs/dev-screen-inventory-v1.json services/gateway/src/frontend/command-hub/navigation-config.js; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "No changes."
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
            git diff --stat services/gateway/specs/dev-screen-inventory-v1.json services/gateway/src/frontend/command-hub/navigation-config.js
          fi

      - name: Open auto-PR
        if: steps.diff.outputs.changed == 'true'
        env:
          GH_TOKEN: ${{ secrets.SCREENS_CATALOG_PR_TOKEN || secrets.GITHUB_TOKEN }}
        run: |
          set -e
          BRANCH="auto/screens-catalog-$(date -u +%Y%m%d-%H%M%S)"
          git config user.name "screens-catalog-bot"
          git config user.email "screens-catalog-bot@users.noreply.github.com"
          git checkout -b "$BRANCH"
          git add services/gateway/specs/dev-screen-inventory-v1.json services/gateway/src/frontend/command-hub/navigation-config.js
          git commit -m "chore(screens): auto-regenerate catalog from sources (DEV-COMHU-0413)"
          git push -u origin "$BRANCH"
          gh pr create \
            --base main \
            --head "$BRANCH" \
            --title "chore(screens): auto-regenerate catalog from sources (DEV-COMHU-0413)" \
            --body "Auto-generated by [REGEN-SCREENS-CATALOG](.github/workflows/REGEN-SCREENS-CATALOG.yml). Source: runtime \`NAVIGATION_CONFIG\` in app.js + \`ADMIN_SECTIONS\` in vitana-v1/src/config/admin-navigation.ts + \`screens-overrides.json\` sidecar. If this PR's only diff is the spec JSON / nav-config.js, no human review needed — auto-merge will land it once CI passes."
          gh pr merge --squash --auto "$BRANCH"
