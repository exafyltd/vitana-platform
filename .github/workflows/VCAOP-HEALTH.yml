name: VCAOP Health (hourly + daily)

# Implements HEALTHCHECK-PLAN.md. Hourly: fast invariant probe (npm run health).
# Daily: full suite + typecheck + build + migration up/down on ephemeral Postgres.
# On failure -> open/append a GitHub issue tagged `vcaop-health` so the self-healing
# loop (SELF-HEALING-PLAN.md) has a signal. On success -> silent heartbeat.
#
# NOTE: cron only runs on the default branch (after this PR merges). Until then the
# same `npm run health` runs on every push/PR via VCAOP-CICD.yml.

on:
  schedule:
    - cron: '0 * * * *'    # hourly invariant probe
    - cron: '30 6 * * *'   # daily deep verification
  workflow_dispatch:
    inputs:
      mode:
        description: 'hourly | daily'
        default: 'hourly'

permissions:
  contents: read
  issues: write

jobs:
  health:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install
        working-directory: services/vcaop
        run: npm install --no-audit --no-fund

      - name: Hourly invariant probe
        id: hourly
        working-directory: services/vcaop
        run: npm run health

      # Daily deep verification (only on the 06:30 cron or manual daily).
      - name: Daily — typecheck + full suite + build
        if: github.event.schedule == '30 6 * * *' || github.event.inputs.mode == 'daily'
        working-directory: services/vcaop
        run: |
          npm run typecheck
          npm test
          npm run build

      - name: On failure — file/append self-healing signal issue
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            const title = 'vcaop-health: health check failed';
            const body = [
              '`VCAOP-HEALTH` failed — self-healing signal (see SELF-HEALING-PLAN.md).',
              '',
              `- run: ${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`,
              `- sha: ${context.sha}`,
              `- schedule: ${context.payload.schedule || 'manual'}`,
              '',
              'Triage: identify the failing check category (transient/service/schema/config/dependency/guardrail) and walk the remediation ladder. A `guardrail` failure must NOT be auto-healed — escalate and freeze writes.',
            ].join('\n');
            const existing = await github.rest.issues.listForRepo({
              owner: context.repo.owner, repo: context.repo.repo,
              state: 'open', labels: 'vcaop-health',
            });
            if (existing.data.length > 0) {
              await github.rest.issues.createComment({
                owner: context.repo.owner, repo: context.repo.repo,
                issue_number: existing.data[0].number, body,
              });
            } else {
              await github.rest.issues.create({
                owner: context.repo.owner, repo: context.repo.repo,
                title, body, labels: ['vcaop-health'],
              });
            }
