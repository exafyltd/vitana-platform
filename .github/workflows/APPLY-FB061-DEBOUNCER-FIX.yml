name: Apply FB-2026-05-000061 ConnectionIssueDebouncer Wiring (one-shot)

# One-shot: applies the prepared, locally-verified orb-live.ts wiring fix for
# VTID-02703 / FB-2026-05-000061 onto claude/gallant-feynman-Wn13y.
#
# PR #1884 shipped the ConnectionIssueDebouncer class but could not modify
# orb-live.ts (686KB, exceeded the autopilot executor's context window at the
# time), so the class was merged unused and the user-facing bug (ORB
# announcing "internet problems" on transient upstream blips that recover)
# stayed live. The same size constraint applies to the assistant session that
# prepared this fix: the changed file can't be pushed via the GitHub Contents
# API without embedding its full 670KB+ content in a single tool call, so
# this workflow applies the small (12KB) prepared patch using Actions' own
# git identity/token instead, the same pattern as this repo's other one-shot
# apply workflows (e.g. APPLY-LONGEVITY-FIX.yml, APPLY-ORB-LATENCY-PHASE1-RETUNE.yml).
#
# Safe to re-run: the "already applied" check short-circuits if the target
# branch already has the fix, so re-dispatching is a no-op.
#
# Self-cleanup: deletes itself from the branch in the same commit as the fix,
# since it has no further purpose once applied and workflow_dispatch-only
# files with no push trigger would otherwise linger.

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: claude/gallant-feynman-Wn13y
          fetch-depth: 0

      - name: Configure git identity
        run: |
          git config user.name "Claude"
          git config user.email "noreply@anthropic.com"

      - name: Check whether already applied
        id: check
        run: |
          if grep -q "connectionIssueDebouncer" services/gateway/src/routes/orb-live.ts; then
            echo "already_applied=true" >> "$GITHUB_OUTPUT"
          else
            echo "already_applied=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Apply prepared patch (VTID-02703 / FB-2026-05-000061)
        if: steps.check.outputs.already_applied == 'false'
        env:
          PATCH_B64: ''
        run: |
          echo "$PATCH_B64" | base64 -d > /tmp/fb061.patch
          git am -3 --keep-cr /tmp/fb061.patch

      - name: Remove this one-shot workflow file
        if: steps.check.outputs.already_applied == 'false'
        run: |
          git rm .github/workflows/APPLY-FB061-DEBOUNCER-FIX.yml
          git commit -m "chore: remove one-shot APPLY-FB061-DEBOUNCER-FIX workflow (applied)"

      - name: Push
        if: steps.check.outputs.already_applied == 'false'
        run: git push origin HEAD:claude/gallant-feynman-Wn13y
