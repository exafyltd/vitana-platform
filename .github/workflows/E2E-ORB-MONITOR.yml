name: ORB Widget Monitor

on:
  schedule:
    # Every 15 minutes
    - cron: '*/15 * * * *'
  workflow_dispatch: {}

concurrency:
  group: orb-monitor
  cancel-in-progress: true

jobs:
  orb-test:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    strategy:
      fail-fast: false
      matrix:
        include:
          - screen: hub
            project: hub-shared
            spec: command-hub/shared/orb-widget.spec.ts
          - screen: desktop
            project: desktop-shared
            spec: community-desktop/shared/orb-widget.spec.ts
          - screen: mobile
            project: mobile-shared
            spec: community-mobile/shared/orb-widget.spec.ts

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install E2E dependencies
        working-directory: e2e
        run: npm ci

      - name: Install Playwright browsers
        working-directory: e2e
        run: npx playwright install chromium --with-deps

      - name: Run ORB Widget tests (${{ matrix.screen }})
        working-directory: e2e
        run: npx playwright test --project=${{ matrix.project }} ${{ matrix.spec }}
        env:
          HUB_URL: https://gateway-q74ibpv6ia-uc.a.run.app
          TEST_USER_EMAIL: ${{ secrets.TEST_USER_EMAIL }}
          TEST_USER_PASSWORD: ${{ secrets.TEST_USER_PASSWORD }}

      - name: Report failure to self-healing
        if: failure()
        env:
          GATEWAY_URL: https://gateway-q74ibpv6ia-uc.a.run.app
          SERVICE_TOKEN: ${{ secrets.GATEWAY_SERVICE_TOKEN }}
        run: |
          if [ -z "$SERVICE_TOKEN" ]; then
            echo "::warning::GATEWAY_SERVICE_TOKEN not set — self-healing report skipped"
            exit 0
          fi
          ENDPOINT="/api/v1/orb/health"
          curl -sS -X POST "$GATEWAY_URL/api/v1/self-healing/report" \
            -H "Authorization: Bearer $SERVICE_TOKEN" \
            -H "Content-Type: application/json" \
            -d '{
              "timestamp": "'"$(date -u +%Y-%m-%dT%H:%M:%SZ)"'",
              "total": 1,
              "live": 0,
              "services": [{
                "name": "orb-widget-${{ matrix.screen }}",
                "endpoint": "'"$ENDPOINT"'",
                "status": "down",
                "http_status": 0,
                "response_body": "E2E ORB Widget test failed for ${{ matrix.screen }} screen (project: ${{ matrix.project }})",
                "response_time_ms": 0,
                "error_message": "Playwright test ${{ matrix.spec }} failed — ORB widget not loading or not functional"
              }]
            }' || echo "::warning::Self-healing report POST failed (non-fatal)"

      # Playwright trace/video artifact upload removed — never used for
      # debugging. Re-add temporarily if investigating a specific failure.
