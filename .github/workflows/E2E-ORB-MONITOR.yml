name: ORB Widget Monitor

on:
  schedule:
    # Every 15 minutes
    - cron: '*/15 * * * *'
  workflow_dispatch: {}

concurrency:
  group: orb-monitor
  cancel-in-progress: true

jobs:
  orb-test:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    strategy:
      fail-fast: false
      matrix:
        include:
          - screen: hub
            project: hub-shared
            spec: command-hub/shared/orb-widget.spec.ts
          - screen: desktop
            project: desktop-shared
            spec: community-desktop/shared/orb-widget.spec.ts
          - screen: mobile
            project: mobile-shared
            spec: community-mobile/shared/orb-widget.spec.ts

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install E2E dependencies
        working-directory: e2e
        run: npm ci

      - name: Install Playwright browsers
        working-directory: e2e
        run: npx playwright install chromium --with-deps

      - name: Run ORB Widget tests (${{ matrix.screen }})
        working-directory: e2e
        run: npx playwright test --project=${{ matrix.project }} ${{ matrix.spec }}
        env:
          HUB_URL: https://gateway-q74ibpv6ia-uc.a.run.app
          TEST_USER_EMAIL: ${{ secrets.TEST_USER_EMAIL }}
          TEST_USER_PASSWORD: ${{ secrets.TEST_USER_PASSWORD }}

      - name: Upload test results on failure
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: orb-${{ matrix.screen }}-results
          path: |
            e2e/test-results/
            e2e/playwright-report/
          retention-days: 7
