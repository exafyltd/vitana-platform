name: Probe Preview Login (temporary diagnostic)

# TEMPORARY: diagnoses why POST /api/v1/auth/login on
# preview-gateway.vitanaland.com returns an HTML 500. Compares the same
# request through the Cloudflare preview-router vs directly against the
# gateway-staging run.app origin. Delete after the staging login issue is
# resolved.

on:
  pull_request:
    paths:
      - '.github/workflows/PROBE-PREVIEW-LOGIN.yml'
  workflow_dispatch: {}

permissions:
  contents: read

jobs:
  probe:
    runs-on: ubuntu-latest
    steps:
      - name: POST login via preview domain (Cloudflare worker path)
        run: |
          echo "=== POST https://preview-gateway.vitanaland.com/api/v1/auth/login ==="
          curl -sS -o /tmp/body1 -D /tmp/hdr1 -w "HTTP %{http_code} | content-type=%{content_type}\n" \
            -X POST "https://preview-gateway.vitanaland.com/api/v1/auth/login" \
            -H "Content-Type: application/json" \
            -d '{"email":"probe@invalid.example","password":"wrong-password"}' || true
          echo "--- response headers ---"; cat /tmp/hdr1
          echo "--- response body (first 2000 bytes) ---"; head -c 2000 /tmp/body1; echo

      - name: POST login direct to gateway-staging run.app (bypasses worker)
        run: |
          echo "=== POST https://gateway-staging-q74ibpv6ia-uc.a.run.app/api/v1/auth/login ==="
          curl -sS -o /tmp/body2 -D /tmp/hdr2 -w "HTTP %{http_code} | content-type=%{content_type}\n" \
            -X POST "https://gateway-staging-q74ibpv6ia-uc.a.run.app/api/v1/auth/login" \
            -H "Content-Type: application/json" \
            -d '{"email":"probe@invalid.example","password":"wrong-password"}' || true
          echo "--- response headers ---"; cat /tmp/hdr2
          echo "--- response body (first 2000 bytes) ---"; head -c 2000 /tmp/body2; echo

      - name: GET health via both paths (control)
        run: |
          echo "=== GET health via preview domain ==="
          curl -sS -w "\nHTTP %{http_code} | content-type=%{content_type}\n" \
            "https://preview-gateway.vitanaland.com/api/v1/admin/health" | head -c 1500; echo
          echo "=== GET health direct run.app ==="
          curl -sS -w "\nHTTP %{http_code} | content-type=%{content_type}\n" \
            "https://gateway-staging-q74ibpv6ia-uc.a.run.app/api/v1/admin/health" | head -c 1500; echo
