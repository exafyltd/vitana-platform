name: Apply Longevity Stub Fix (one-shot)

# BOOTSTRAP-LONGEVITY-STAGE-FIX
#
# Runs on the GitHub-hosted runner (which CAN reach the prod Supabase DB via
# the SUPABASE_DB_URL secret) to apply the drift-proof longevity migration and
# verify it end-to-end WITHOUT triggering the notification-sending recompute
# pipeline.
#
# Triggered by push to the fix branch. Idempotent: the migration is
# CREATE OR REPLACE and the verification calls a pure stub function (no writes,
# no notifications). Safe to re-run.
#
# Two jobs:
#   apply_and_verify — applies + proves the fix in ~1-2 min (fast check-run)
#   watch_oasis      — 1-hour watch for any new longevity failure event

on:
  workflow_dispatch: {}
  push:
    branches:
      - claude/jolly-wright-mvB8z
    paths:
      - 'supabase/migrations/20260528184700_BOOTSTRAP_fix_longevity_stub_drift_proof.sql'
      - '.github/workflows/APPLY-LONGEVITY-FIX.yml'

permissions:
  contents: read

jobs:
  apply_and_verify:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      SUPABASE_DB_URL: ${{ secrets.SUPABASE_DB_URL }}
      MIGRATION_FILE: supabase/migrations/20260528184700_BOOTSTRAP_fix_longevity_stub_drift_proof.sql
    steps:
      - uses: actions/checkout@v4

      - name: Install psql
        run: sudo apt-get install -y postgresql-client > /dev/null 2>&1

      - name: 0 · Ground-truth — live public.tenants columns (information_schema)
        run: |
          set -euo pipefail
          echo "## Longevity fix — live schema (information_schema)" >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
          psql -v ON_ERROR_STOP=1 "$SUPABASE_DB_URL" -P pager=off -c \
            "SELECT column_name, data_type FROM information_schema.columns
             WHERE table_schema='public' AND table_name='tenants' ORDER BY ordinal_position;" | tee -a "$GITHUB_STEP_SUMMARY"
          echo "tenants.id present?         $(psql -tA -v ON_ERROR_STOP=1 "$SUPABASE_DB_URL" -c "SELECT EXISTS(SELECT 1 FROM information_schema.columns WHERE table_schema='public' AND table_name='tenants' AND column_name='id');")" | tee -a "$GITHUB_STEP_SUMMARY"
          echo "tenants.tenant_id present?  $(psql -tA -v ON_ERROR_STOP=1 "$SUPABASE_DB_URL" -c "SELECT EXISTS(SELECT 1 FROM information_schema.columns WHERE table_schema='public' AND table_name='tenants' AND column_name='tenant_id');")" | tee -a "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"

      - name: 1 · Apply migration (transactional, ON_ERROR_STOP)
        run: |
          set -euo pipefail
          echo "Applying ${MIGRATION_FILE}"
          psql -v ON_ERROR_STOP=1 -f "${MIGRATION_FILE}" "$SUPABASE_DB_URL"
          echo "Migration applied."

      - name: 2 · Reload PostgREST schema cache
        run: |
          set -euo pipefail
          psql -v ON_ERROR_STOP=1 -c "NOTIFY pgrst, 'reload schema';" "$SUPABASE_DB_URL"

      - name: 3 · Verify — exercise the exact failing op for every user (no side effects)
        run: |
          set -euo pipefail
          echo "Test-user RPC result:"
          psql -tA -v ON_ERROR_STOP=1 "$SUPABASE_DB_URL" -c \
            "SELECT public.scheduler_longevity_compute_daily('a27552a3-0257-4305-8ed0-351a80fd3701'::uuid, current_date);"
          # Sweep up to 500 real users: count any ok<>true. The function is a
          # pure stub (returns JSON, writes nothing), so this is side-effect-free.
          read -r FAILURES TOTAL < <(psql -tA -F' ' -v ON_ERROR_STOP=1 "$SUPABASE_DB_URL" -c \
            "SELECT count(*) FILTER (WHERE (public.scheduler_longevity_compute_daily(user_id, current_date)->>'ok') IS DISTINCT FROM 'true'),
                    count(*)
             FROM (SELECT user_id FROM public.app_users LIMIT 500) u;")
          echo "Longevity RPC sweep: ${FAILURES} failures / ${TOTAL} users"
          {
            echo "## Verification"
            echo "- Longevity RPC sweep: **${FAILURES} failures / ${TOTAL} users**"
          } >> "$GITHUB_STEP_SUMMARY"
          if [ "${FAILURES}" != "0" ]; then
            echo "::error::Longevity RPC still failing for ${FAILURES} users after fix"
            exit 1
          fi
          echo "All sampled users return ok=true."

  watch_oasis:
    needs: apply_and_verify
    runs-on: ubuntu-latest
    timeout-minutes: 75
    env:
      SUPABASE_DB_URL: ${{ secrets.SUPABASE_DB_URL }}
      WATCH_MINUTES: '60'
    steps:
      - name: Install psql
        run: sudo apt-get install -y postgresql-client > /dev/null 2>&1

      - name: Watch OASIS for 1h — fail on any new longevity failure
        run: |
          set -euo pipefail
          WATCH_START="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          echo "Watching oasis_events since ${WATCH_START} for ${WATCH_MINUTES} min..."
          END=$(( $(date +%s) + WATCH_MINUTES*60 ))
          while [ "$(date +%s)" -lt "$END" ]; do
            NEW=$(psql -tA -v ON_ERROR_STOP=1 "$SUPABASE_DB_URL" -c \
              "SELECT count(*) FROM public.oasis_events
               WHERE type IN ('vtid.stage.longevity.failed','vtid.daily_recompute.failed')
                 AND created_at > '${WATCH_START}'::timestamptz;" || echo "0")
            if [ "${NEW}" != "0" ]; then
              echo "::error::Observed ${NEW} new longevity/daily_recompute failure event(s) since fix"
              psql -v ON_ERROR_STOP=1 "$SUPABASE_DB_URL" -P pager=off -c \
                "SELECT created_at, type, message FROM public.oasis_events
                 WHERE type IN ('vtid.stage.longevity.failed','vtid.daily_recompute.failed')
                   AND created_at > '${WATCH_START}'::timestamptz ORDER BY created_at DESC LIMIT 20;"
              exit 1
            fi
            sleep 180
          done
          echo "0 new longevity/daily_recompute failures in ${WATCH_MINUTES} min."
          {
            echo "## 1-hour OASIS watch"
            echo "- New \`stage.longevity.failed\` / \`daily_recompute.failed\` since ${WATCH_START}: **0**"
            echo "- Done criterion met."
          } >> "$GITHUB_STEP_SUMMARY"
