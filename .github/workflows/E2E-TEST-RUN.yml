name: E2E Test Run

on:
  repository_dispatch:
    types: [community-app-deployed]
  workflow_dispatch:
    inputs:
      projects:
        description: 'Comma-separated Playwright project names (e.g. hub-shared,desktop-shared)'
        required: true
        type: string
      spec_filter:
        description: 'Optional spec file filter (e.g. orb-widget.spec.ts)'
        required: false
        type: string
        default: ''
      community_url:
        description: 'Community app URL to test against (default: vitanaland.com, use Cloud Run URL for migration testing)'
        required: false
        type: string
        default: 'https://vitanaland.com'

concurrency:
  group: e2e-run-${{ github.run_id }}
  cancel-in-progress: false

jobs:
  e2e-test:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install E2E dependencies
        working-directory: e2e
        run: npm ci

      - name: Install Playwright browsers
        working-directory: e2e
        run: npx playwright install chromium --with-deps

      - name: Build Playwright command
        id: cmd
        run: |
          # Support both workflow_dispatch inputs and repository_dispatch payload
          if [ "${{ github.event_name }}" = "repository_dispatch" ]; then
            PROJECTS="${{ github.event.client_payload.projects }}"
            SPEC=""
          else
            PROJECTS="${{ inputs.projects }}"
            SPEC="${{ inputs.spec_filter }}"
          fi
          CMD="npx playwright test"
          # Add each project as --project flag
          IFS=',' read -ra PROJ_ARRAY <<< "$PROJECTS"
          for proj in "${PROJ_ARRAY[@]}"; do
            proj=$(echo "$proj" | xargs)  # trim whitespace
            CMD="$CMD --project=$proj"
          done
          # Add spec filter if provided
          if [ -n "$SPEC" ]; then
            CMD="$CMD $SPEC"
          fi
          echo "cmd=$CMD" >> $GITHUB_OUTPUT
          echo "Running: $CMD"

      - name: Run E2E tests
        working-directory: e2e
        run: ${{ steps.cmd.outputs.cmd }}
        env:
          HUB_URL: https://gateway-q74ibpv6ia-uc.a.run.app
          COMMUNITY_URL: ${{ github.event_name == 'repository_dispatch' && github.event.client_payload.community_url || inputs.community_url || 'https://vitanaland.com' }}
          TEST_USER_EMAIL: ${{ secrets.TEST_USER_EMAIL }}
          TEST_USER_PASSWORD: ${{ secrets.TEST_USER_PASSWORD }}
          LOVABLE_SUPABASE_SERVICE_ROLE: ${{ secrets.LOVABLE_SUPABASE_SERVICE_ROLE }}

      - name: Report failure to self-healing
        if: failure()
        env:
          GATEWAY_URL: https://gateway-q74ibpv6ia-uc.a.run.app
          SERVICE_TOKEN: ${{ secrets.GATEWAY_SERVICE_TOKEN }}
        run: |
          if [ -z "$SERVICE_TOKEN" ]; then
            echo "::warning::GATEWAY_SERVICE_TOKEN not set — self-healing report skipped"
            exit 0
          fi
          # Determine which projects failed from the input
          PROJECTS="${{ github.event_name == 'repository_dispatch' && github.event.client_payload.projects || inputs.projects }}"
          curl -sS -X POST "$GATEWAY_URL/api/v1/self-healing/report" \
            -H "Authorization: Bearer $SERVICE_TOKEN" \
            -H "Content-Type: application/json" \
            -d '{
              "timestamp": "'"$(date -u +%Y-%m-%dT%H:%M:%SZ)"'",
              "total": 1,
              "live": 0,
              "services": [{
                "name": "e2e-test-run",
                "endpoint": "/api/v1/e2e/health",
                "status": "down",
                "http_status": 0,
                "response_body": "E2E tests failed for projects: '"$PROJECTS"'",
                "response_time_ms": 0,
                "error_message": "Playwright E2E test suite failed — user-facing flows are broken"
              }]
            }' || echo "::warning::Self-healing report POST failed (non-fatal)"

      - name: Upload test results on failure
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: e2e-results-${{ github.run_id }}
          path: |
            e2e/test-results/
            e2e/playwright-report/
          retention-days: 7
