name: Hourly Status Check
on:
  schedule:
    # Run every hour at :00 (was daily at 08:00 — too slow for self-healing)
    - cron: '0 * * * *'
  workflow_dispatch:

jobs:
  update-status:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      - run: pip install requests
      - env:
          WEBHOOK_URL: ${{ secrets.VITANA_CHAT_WEBHOOK }}
          SERVICE_TOKEN: ${{ secrets.GATEWAY_SERVICE_TOKEN }}
          GATEWAY_URL: https://gateway-q74ibpv6ia-uc.a.run.app
        run: python3 scripts/ci/collect-status.py
      - name: Commit + publish status snapshot
        run: |
          set -euo pipefail
          git config user.name "Vitana Automation"
          git config user.email "automation@vitana.dev"
          git add docs/STATUS.md
          if git diff --quiet --cached; then
            echo "No changes"
          else
            git commit -m "chore: hourly status - $(date -u +'%Y-%m-%d %H:%M:%S UTC')"
            # Publish to a dedicated, unprotected branch instead of `main`.
            # `main` requires the "validate" status check (the `validate` job
            # in ENFORCE-FRONTEND-CANONICAL-SOURCE.yml), which only ever runs
            # on pull_request — a direct push here can never satisfy it, so
            # every push to main was rejected with GH006 (protected branch).
            # docs/STATUS.md is a generated report, not frontend source, so it
            # doesn't need that check at all; publishing it to its own branch
            # keeps the report flowing without touching branch protection or
            # the validator gate.
            git push --force origin "HEAD:refs/heads/automation/status-report"
          fi
