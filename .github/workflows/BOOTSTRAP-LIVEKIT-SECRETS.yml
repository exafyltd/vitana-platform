name: BOOTSTRAP-LIVEKIT-SECRETS

# VTID-LIVEKIT-FOUNDATION: one-shot bootstrap that copies LiveKit credentials
# from GitHub Actions secrets into GCP Secret Manager.
#
# Run after the LIVEKIT_URL / LIVEKIT_API_KEY / LIVEKIT_API_SECRET Actions
# secrets are populated. Idempotent — safe to re-run when keys rotate.

on:
  workflow_dispatch:
    inputs:
      include_provider_keys:
        description: 'Also bootstrap DEEPGRAM_API_KEY / CARTESIA_API_KEY / ANTHROPIC_API_KEY into Secret Manager (must already exist as Actions secrets)'
        required: false
        type: boolean
        default: false

permissions:
  contents: read
  id-token: write

env:
  GCP_PROJECT_ID: lovable-vitana-vers1

jobs:
  bootstrap:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WIF_PROVIDER }}
          service_account: ${{ secrets.GCP_WIF_SA_EMAIL }}

      - uses: google-github-actions/setup-gcloud@v2

      - name: Push LiveKit secrets
        env:
          LIVEKIT_URL: ${{ secrets.LIVEKIT_URL }}
          LIVEKIT_API_KEY: ${{ secrets.LIVEKIT_API_KEY }}
          LIVEKIT_API_SECRET: ${{ secrets.LIVEKIT_API_SECRET }}
        run: |
          set -euo pipefail
          push_secret() {
            local name=$1 value=$2
            if [ -z "$value" ]; then
              echo "::warning::skipping $name — Actions secret is empty"
              return
            fi
            if gcloud secrets describe "$name" --project="$GCP_PROJECT_ID" >/dev/null 2>&1; then
              echo "$value" | gcloud secrets versions add "$name" --data-file=- --project="$GCP_PROJECT_ID"
              echo "✓ $name — added new version"
            else
              echo "$value" | gcloud secrets create "$name" --data-file=- --replication-policy=automatic --project="$GCP_PROJECT_ID"
              echo "✓ $name — created"
            fi
          }
          push_secret LIVEKIT_URL          "$LIVEKIT_URL"
          push_secret LIVEKIT_API_KEY      "$LIVEKIT_API_KEY"
          push_secret LIVEKIT_API_SECRET   "$LIVEKIT_API_SECRET"

      - name: Push provider keys (optional)
        if: ${{ inputs.include_provider_keys }}
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          DEEPGRAM_API_KEY: ${{ secrets.DEEPGRAM_API_KEY }}
          CARTESIA_API_KEY: ${{ secrets.CARTESIA_API_KEY }}
          GATEWAY_SERVICE_TOKEN: ${{ secrets.GATEWAY_SERVICE_TOKEN }}
        run: |
          set -euo pipefail
          push_secret() {
            local name=$1 value=$2
            if [ -z "$value" ]; then
              echo "::warning::skipping $name — Actions secret is empty"
              return
            fi
            if gcloud secrets describe "$name" --project="$GCP_PROJECT_ID" >/dev/null 2>&1; then
              echo "$value" | gcloud secrets versions add "$name" --data-file=- --project="$GCP_PROJECT_ID"
              echo "✓ $name — added new version"
            else
              echo "$value" | gcloud secrets create "$name" --data-file=- --replication-policy=automatic --project="$GCP_PROJECT_ID"
              echo "✓ $name — created"
            fi
          }
          push_secret ANTHROPIC_API_KEY    "$ANTHROPIC_API_KEY"
          push_secret DEEPGRAM_API_KEY     "$DEEPGRAM_API_KEY"
          push_secret CARTESIA_API_KEY     "$CARTESIA_API_KEY"
          push_secret GATEWAY_SERVICE_TOKEN "$GATEWAY_SERVICE_TOKEN"

      - name: Verify
        run: |
          set -euo pipefail
          echo "Secrets present in $GCP_PROJECT_ID:"
          gcloud secrets list --project="$GCP_PROJECT_ID" --filter="name~LIVEKIT_ OR name~DEEPGRAM_ OR name~CARTESIA_ OR name~ANTHROPIC_ OR name~GATEWAY_SERVICE_" --format="table(name,createTime)"
