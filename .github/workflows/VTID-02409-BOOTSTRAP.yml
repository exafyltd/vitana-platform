name: VTID-02409 Bootstrap (ledger + speeches schema + exec-deploy)

on:
  push:
    branches: [main]
    paths:
      - '.github/workflows/VTID-02409-BOOTSTRAP.yml'
  workflow_dispatch:

permissions:
  contents: read
  actions: write

jobs:
  # Staging-first cutover gate. Freezes the AUTOMATIC (push) prod-gateway
  # dispatch at/after Mon 8 Jun 2026, 10:00 Europe/Berlin. Manual dispatch is
  # the documented exception and is never frozen.
  cutover_gate:
    runs-on: ubuntu-latest
    outputs:
      frozen: ${{ steps.gate.outputs.frozen }}
    steps:
      - name: Evaluate staging-first cutover
        id: gate
        shell: bash
        run: |
          CUTOVER_EPOCH="$(date -d 'TZ="Europe/Berlin" 2026-06-08 10:00:00' +%s)"
          NOW_EPOCH="$(date -u +%s)"
          if [ "${GITHUB_EVENT_NAME}" = "workflow_dispatch" ]; then
            echo "Manual dispatch → not frozen (deliberate prod exception)."
            echo "frozen=false" >> "$GITHUB_OUTPUT"
          elif [ "$NOW_EPOCH" -ge "$CUTOVER_EPOCH" ]; then
            echo "::warning::Staging-first cutover ACTIVE — auto prod dispatch frozen."
            echo "frozen=true" >> "$GITHUB_OUTPUT"
          else
            echo "Pre-cutover — proceeds (cutover at $(date -u -d @${CUTOVER_EPOCH}) UTC)."
            echo "frozen=false" >> "$GITHUB_OUTPUT"
          fi

  bootstrap:
    needs: cutover_gate
    if: needs.cutover_gate.outputs.frozen != 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install psql
        run: sudo apt-get install -y postgresql-client > /dev/null 2>&1

      - name: Register VTID-02409 in vtid_ledger
        env:
          SUPABASE_DB_URL: ${{ secrets.SUPABASE_DB_URL }}
        run: |
          psql "$SUPABASE_DB_URL" -f "supabase/migrations/20260419094000_vtid_02409_register_ledger.sql"

      - name: Apply tenant_assistant_speeches schema
        env:
          SUPABASE_DB_URL: ${{ secrets.SUPABASE_DB_URL }}
        run: |
          psql "$SUPABASE_DB_URL" -f "supabase/migrations/20260418060000_tenant_assistant_speeches.sql"

      - name: Reload PostgREST schema cache
        env:
          SUPABASE_DB_URL: ${{ secrets.SUPABASE_DB_URL }}
        run: |
          psql "$SUPABASE_DB_URL" -c "NOTIFY pgrst, 'reload schema';"

      - name: Dispatch EXEC-DEPLOY for gateway
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.actions.createWorkflowDispatch({
              owner: context.repo.owner,
              repo: context.repo.repo,
              workflow_id: "EXEC-DEPLOY.yml",
              ref: "main",
              inputs: {
                vtid: "VTID-02409",
                service: "gateway",
                environment: "dev",
                health_path: "/alive",
                initiator: "agent"
              }
            });
            core.info("Dispatched EXEC-DEPLOY.yml for VTID-02409 service=gateway");
